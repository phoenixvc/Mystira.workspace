version: '3.8'

services:
  # Local development database
  postgres:
    image: postgres:18-alpine@sha256:aa6eb304ddb6dd26df23d05db4e5cb05af8951cda3e0dc57731b771e0ef4ab29
    container_name: mystira-postgres
    environment:
      POSTGRES_USER: mystira
      POSTGRES_PASSWORD: mystira_dev
      POSTGRES_DB: mystira_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mystira"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and queues
  redis:
    image: redis:8-alpine@sha256:6cbef353e480a8a6e7f10ec545f13d7d3fa85a212cdcc5ffaf5a1c818b9d3798
    container_name: mystira-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local blockchain node (Hardhat)
  hardhat:
    image: node:24-alpine@sha256:c921b97d4b74f51744057454b306b418cf693865e73b8100559189605f6955b8
    container_name: mystira-hardhat
    working_dir: /app
    volumes:
      - ./packages/chain:/app
    ports:
      - "8545:8545"
    command: sh -c "npm install -g pnpm && pnpm install && pnpm hardhat node"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

