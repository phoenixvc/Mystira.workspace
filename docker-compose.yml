version: '3.8'

services:
  # Local development database
  postgres:
    image: postgres:18-alpine@sha256:035b9ab53cfa147d7202b61f5f7782b939ae815b7d6bc81c96b7b42ff1fca950
    container_name: mystira-postgres
    environment:
      POSTGRES_USER: mystira
      POSTGRES_PASSWORD: mystira_dev
      POSTGRES_DB: mystira_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mystira"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and queues
  redis:
    image: redis:8-alpine@sha256:fd83658b0e40e2164617d262f13c02ca9ee9e1e6b276fd2fa06617e09bd5c780
    container_name: mystira-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local blockchain node (Hardhat)
  hardhat:
    image: node:24-alpine@sha256:4f696fbf39f383c1e486030ba6b289a5d9af541642fc78ab197e584a113b9c03
    container_name: mystira-hardhat
    working_dir: /app
    volumes:
      - ./packages/chain:/app
    ports:
      - "8545:8545"
    command: sh -c "npm install -g pnpm && pnpm install && pnpm hardhat node"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

