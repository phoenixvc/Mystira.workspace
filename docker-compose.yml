version: '3.8'

services:
  # Local development database
  postgres:
    image: postgres:18-alpine@sha256:b40d931bd0e7ce6eecc59a5a6ac3b3c04a01e559750e73e7086b6dbd7f8bf545
    container_name: mystira-postgres
    environment:
      POSTGRES_USER: mystira
      POSTGRES_PASSWORD: mystira_dev
      POSTGRES_DB: mystira_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mystira"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and queues
  redis:
    image: redis:8-alpine@sha256:fd83658b0e40e2164617d262f13c02ca9ee9e1e6b276fd2fa06617e09bd5c780
    container_name: mystira-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local blockchain node (Hardhat)
  hardhat:
    image: node:24-alpine@sha256:cd6fb7efa6490f039f3471a189214d5f548c11df1ff9e5b181aa49e22c14383e
    container_name: mystira-hardhat
    working_dir: /app
    volumes:
      - ./packages/chain:/app
    ports:
      - "8545:8545"
    command: sh -c "npm install -g pnpm && pnpm install && pnpm hardhat node"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

