<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mystira.StoryGenerator.Web</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Mystira.StoryGenerator.Web.styles.css" rel="stylesheet" />
    <link href="_content/Syncfusion.Blazor.Themes/bootstrap5.css" rel="stylesheet" />
</head>

<body>
    <script>console.log("[DEBUG_JS] index.html: Body script start");</script>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="js/download.js?v=2"></script>
    <script src="js/panels.js"></script>
    <script src="js/clipboard.js"></script>
    <script src="js/yamlPreview.js"></script>
    <script src="js/sseClient.js"></script>
    <script src="_content/Syncfusion.Blazor.Core/scripts/syncfusion-blazor.min.js" type="text/javascript"></script>
    <script>
        console.log("[DEBUG_JS] index.html: Starting Blazor...");
        window.addEventListener('error', function (e) {
            console.error("[DEBUG_JS] Global error:", e.error);
        });
        window.addEventListener('unhandledrejection', function (e) {
            console.error("[DEBUG_JS] Unhandled promise rejection:", e.reason);
        });
    </script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        console.log("[DEBUG_JS] index.html: blazor.webassembly.js loaded, calling Blazor.start()...");
        const blazorStartConfig = {
            logLevel: 0, // Trace
            loadBootResource: function (type, name, defaultUri, integrity) {
                console.log(`[DEBUG_JS] Loading: ${type} - ${name}`);
                return defaultUri;
            },
            configureRuntime: (builder) => {
                console.log("[DEBUG_JS] Runtime builder configured");
                builder.withConfig({
                    logLevel: 0
                });
            }
        };
        console.log("[DEBUG_JS] index.html: Invoking Blazor.start()...");
        Blazor.start(blazorStartConfig).then(() => {
            console.log("[DEBUG_JS] index.html: Blazor.start() resolved.");
        }).catch(err => {
            console.error("[DEBUG_JS] index.html: Blazor.start() failed:", err);
            if (err) {
                console.error("[DEBUG_JS] Error Details:", {
                    message: err.message,
                    stack: err.stack,
                    name: err.name
                });
            }
        });
    </script>
</body>

</html>
