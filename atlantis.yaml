# =============================================================================
# Allowed Regexp Commands
# =============================================================================
# Restrict what commands can be run via PR comments
allowed_regexp_commands:
  - "atlantis plan"
  - "atlantis plan -d.*"
  - "atlantis apply"
  - "atlantis apply -d.*"
  - "atlantis unlock"
