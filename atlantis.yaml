# =============================================================================
# Atlantis Configuration
# =============================================================================
# PR-based Terraform/Terragrunt workflow automation.
#
# Atlantis enables:
#   - Automatic terraform plan on PR open/update
#   - Plan output as PR comments
#   - Apply via PR comment commands (atlantis apply)
#   - Policy enforcement via conftest
#   - Multi-workspace support
#
# Setup:
#   1. Deploy Atlantis server (self-hosted or Atlantis Cloud)
#   2. Configure webhook to Atlantis server
#   3. Set required secrets (ATLANTIS_GH_TOKEN, ARM_* credentials)
#
# Documentation: https://www.runatlantis.io/docs/
# =============================================================================

version: 3

automerge: false
parallel_plan: true
parallel_apply: false  # Sequential applies for safety

# =============================================================================
# Global Settings
# =============================================================================
delete_source_branch_on_merge: false
abort_on_execution_order_fail: true

# =============================================================================
# Terragrunt Workflows
# =============================================================================
workflows:
  terragrunt:
    plan:
      steps:
        - env:
            name: TF_IN_AUTOMATION
            value: "true"
        - env:
            name: TERRAGRUNT_TFPATH
            command: "which terraform"
        - run: terragrunt hclfmt --terragrunt-check
        - run: terragrunt init --terragrunt-non-interactive
        - run: terragrunt plan -out=$PLANFILE --terragrunt-non-interactive
    apply:
      steps:
        - env:
            name: TF_IN_AUTOMATION
            value: "true"
        - run: terragrunt apply $PLANFILE --terragrunt-non-interactive

  terragrunt-stack:
    plan:
      steps:
        - env:
            name: TF_IN_AUTOMATION
            value: "true"
        - run: |
            terragrunt stack run plan \
              --stack-config $STACK_CONFIG \
              --out=stack.tfplan \
              --terragrunt-non-interactive
    apply:
      steps:
        - env:
            name: TF_IN_AUTOMATION
            value: "true"
        - run: |
            terragrunt stack run apply \
              --stack-config $STACK_CONFIG \
              --terragrunt-non-interactive \
              --auto-approve

# =============================================================================
# Project Definitions
# =============================================================================
projects:
  # ---------------------------------------------------------------------------
  # Shared Infrastructure
  # ---------------------------------------------------------------------------
  - name: shared-infra-dev
    dir: infra/terraform/shared-infra/environments/dev
    workflow: terragrunt
    workspace: default
    terraform_version: v1.10.3
    autoplan:
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "terragrunt.hcl"
        - "../../../modules/shared/**"
        - "../../../terragrunt.hcl"
      enabled: true
    apply_requirements:
      - approved
      - mergeable

