apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mys-staging

resources:
  - ../../base
  - ../../base/chain
  - ../../base/publisher
  - ../../base/story-generator
  - ../../base/admin-api
  - ../../base/admin-ui
  - ../../base/cert-manager
  - ../../base/service-mesh  # Istio mTLS configuration

labels:
  - pairs:
      environment: staging
    includeSelectors: true

patches:
  # Enable Istio sidecar injection for the namespace
  - target:
      kind: Namespace
      name: mystira
    patch: |-
      - op: add
        path: /metadata/labels/istio-injection
        value: "enabled"
  # ServiceAccount patches for workload identity client IDs
  # These values should be populated from Terraform outputs:
  #   terraform output -json | jq -r '.admin_api_identity_client_id.value'
  # TODO(#INFRA-289): Migrate to kustomize vars/ConfigMapGenerator for dynamic injection
  - target:
      kind: ServiceAccount
      name: admin-api-sa
    patch: |-
      - op: replace
        path: /metadata/annotations/azure.workload.identity~1client-id
        value: "00000000-0000-0000-0000-000000000001"
  - target:
      kind: ServiceAccount
      name: story-generator-sa
    patch: |-
      - op: replace
        path: /metadata/annotations/azure.workload.identity~1client-id
        value: "00000000-0000-0000-0000-000000000002"
  - target:
      kind: ServiceAccount
      name: publisher-sa
    patch: |-
      - op: replace
        path: /metadata/annotations/azure.workload.identity~1client-id
        value: "00000000-0000-0000-0000-000000000003"
  - target:
      kind: ServiceAccount
      name: chain-sa
    patch: |-
      - op: replace
        path: /metadata/annotations/azure.workload.identity~1client-id
        value: "00000000-0000-0000-0000-000000000004"
  - target:
      kind: Ingress
      name: mys-publisher-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "staging.publisher.mystira.app"
      - op: replace
        path: /spec/rules/0/host
        value: "staging.publisher.mystira.app"
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: "letsencrypt-staging"
  - target:
      kind: Ingress
      name: mys-chain-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "staging.chain.mystira.app"
      - op: replace
        path: /spec/rules/0/host
        value: "staging.chain.mystira.app"
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: "letsencrypt-staging"
  - target:
      kind: StatefulSet
      name: mys-chain
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: remove
        path: /spec/template/spec/nodeSelector
      - op: remove
        path: /spec/template/spec/tolerations
  - target:
      kind: Deployment
      name: mys-publisher
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: remove
        path: /spec/template/spec/nodeSelector
  - target:
      kind: ConfigMap
      name: mys-publisher-config
    patch: |-
      - op: replace
        path: /data/key_vault_url
        value: "https://mys-staging-pub-kv-san.vault.azure.net/"
  - target:
      kind: ConfigMap
      name: mys-chain-config
    patch: |-
      - op: replace
        path: /data/key_vault_url
        value: "https://mys-staging-chain-kv-san.vault.azure.net/"
  - target:
      kind: Ingress
      name: mys-story-generator-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "staging.story-api.mystira.app"
      - op: replace
        path: /spec/rules/0/host
        value: "staging.story-api.mystira.app"
      - op: replace
        path: /spec/tls/0/secretName
        value: "mys-story-generator-tls-staging"
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: "letsencrypt-staging"
  - target:
      kind: Deployment
      name: mys-story-generator
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: ConfigMap
      name: mys-story-generator-config
    patch: |-
      - op: replace
        path: /data/key_vault_url
        value: "https://mys-staging-story-kv-san.vault.azure.net/"
  - target:
      kind: Ingress
      name: mys-admin-api-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "staging.admin-api.mystira.app"
      - op: replace
        path: /spec/rules/0/host
        value: "staging.admin-api.mystira.app"
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: "letsencrypt-staging"
  - target:
      kind: Ingress
      name: mys-admin-ui-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "staging.admin.mystira.app"
      - op: replace
        path: /spec/rules/0/host
        value: "staging.admin.mystira.app"
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: "letsencrypt-staging"
  - target:
      kind: Deployment
      name: mys-admin-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: mys-admin-ui
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: ConfigMap
      name: mys-admin-api-config
    patch: |-
      - op: replace
        path: /data/key_vault_url
        value: "https://mys-staging-admin-kv-san.vault.azure.net/"
  - target:
      kind: ConfigMap
      name: mys-admin-ui-config
    patch: |-
      - op: replace
        path: /data/api_url
        value: "https://staging.admin-api.mystira.app"

images:
  - name: myssharedacr.azurecr.io/chain
    newTag: staging
  - name: myssharedacr.azurecr.io/publisher
    newTag: staging
  - name: myssharedacr.azurecr.io/story-generator
    newTag: staging
  - name: myssharedacr.azurecr.io/admin-api
    newTag: staging
  - name: myssharedacr.azurecr.io/admin-ui
    newTag: staging
