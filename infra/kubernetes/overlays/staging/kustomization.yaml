apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mys-staging

resources:
  - ../../base
  - ../../base/chain
  - ../../base/publisher
  - ../../base/story-generator
  - ../../base/admin-api
  - ../../base/admin-ui
  - ../../base/cert-manager
  - ../../base/service-mesh  # Istio mTLS configuration

# ServiceAccount patches for workload identity client IDs
# These values should be populated from Terraform outputs:
#   terraform output -json | jq -r '.admin_api_identity_client_id.value'
#
# IMPORTANT: CI/CD pipeline should:
# 1. Run `terraform output -json` and extract client IDs
# 2. Use envsubst or sed to replace placeholder UUIDs before kubectl apply
# 3. Pre-deploy validation should fail if any client-id matches pattern:
#    grep -E '00000000-0000-0000-0000-00000000000[0-9]' kustomization.yaml && exit 1
#
# TODO(#INFRA-289): Migrate to kustomize vars/ConfigMapGenerator for dynamic injection
patchesStrategicMerge:
  # Enable Istio sidecar injection for the namespace
  - |-
    apiVersion: v1
    kind: Namespace
    metadata:
      name: mystira
      labels:
        istio-injection: enabled
  - |-
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: admin-api-sa
      namespace: mys-staging
      annotations:
        azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000001"
  - |-
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: story-generator-sa
      namespace: mys-staging
      annotations:
        azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000002"
  - |-
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: publisher-sa
      namespace: mys-staging
      annotations:
        azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000003"
  - |-
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: chain-sa
      namespace: mys-staging
      annotations:
        azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000004"

labels:
  - pairs:
      environment: staging
    includeSelectors: true

patches:
  - target:
      kind: Ingress
      name: mys-publisher-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "staging.publisher.mystira.app"
      - op: replace
        path: /spec/rules/0/host
        value: "staging.publisher.mystira.app"
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: "letsencrypt-staging"
  - target:
      kind: Ingress
      name: mys-chain-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "staging.chain.mystira.app"
      - op: replace
        path: /spec/rules/0/host
        value: "staging.chain.mystira.app"
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: "letsencrypt-staging"
  - target:
      kind: StatefulSet
      name: mys-chain
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: remove
        path: /spec/template/spec/nodeSelector
      - op: remove
        path: /spec/template/spec/tolerations
  - target:
      kind: Deployment
      name: mys-publisher
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: remove
        path: /spec/template/spec/nodeSelector
  - target:
      kind: ConfigMap
      name: mys-publisher-config
    patch: |-
      - op: replace
        path: /data/key_vault_url
        value: "https://mys-staging-pub-kv-san.vault.azure.net/"
  - target:
      kind: ConfigMap
      name: mys-chain-config
    patch: |-
      - op: replace
        path: /data/key_vault_url
        value: "https://mys-staging-chain-kv-san.vault.azure.net/"
  - target:
      kind: Ingress
      name: mys-story-generator-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "staging.story-api.mystira.app"
      - op: replace
        path: /spec/rules/0/host
        value: "staging.story-api.mystira.app"
      - op: replace
        path: /spec/tls/0/secretName
        value: "mys-story-generator-tls-staging"
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: "letsencrypt-staging"
  - target:
      kind: Deployment
      name: mys-story-generator
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: ConfigMap
      name: mys-story-generator-config
    patch: |-
      - op: replace
        path: /data/key_vault_url
        value: "https://mys-staging-story-kv-san.vault.azure.net/"
  - target:
      kind: Ingress
      name: mys-admin-api-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "staging.admin-api.mystira.app"
      - op: replace
        path: /spec/rules/0/host
        value: "staging.admin-api.mystira.app"
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: "letsencrypt-staging"
  - target:
      kind: Ingress
      name: mys-admin-ui-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "staging.admin.mystira.app"
      - op: replace
        path: /spec/rules/0/host
        value: "staging.admin.mystira.app"
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: "letsencrypt-staging"
  - target:
      kind: Deployment
      name: mys-admin-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: mys-admin-ui
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: ConfigMap
      name: mys-admin-api-config
    patch: |-
      - op: replace
        path: /data/key_vault_url
        value: "https://mys-staging-admin-kv-san.vault.azure.net/"
  - target:
      kind: ConfigMap
      name: mys-admin-ui-config
    patch: |-
      - op: replace
        path: /data/api_url
        value: "https://staging.admin-api.mystira.app"

images:
  - name: myssharedacr.azurecr.io/chain
    newTag: staging
  - name: myssharedacr.azurecr.io/publisher
    newTag: staging
  - name: myssharedacr.azurecr.io/story-generator
    newTag: staging
  - name: myssharedacr.azurecr.io/admin-api
    newTag: staging
  - name: myssharedacr.azurecr.io/admin-ui
    newTag: staging
