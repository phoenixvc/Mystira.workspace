apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mys-admin-api
  labels:
    app: mys-admin-api
    component: api
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
    - hosts:
        - admin-api.mystira.app
      secretName: mys-admin-api-tls
  rules:
    - host: admin-api.mystira.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mys-admin-api
                port:
                  number: 80
