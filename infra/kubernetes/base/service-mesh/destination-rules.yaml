# Istio DestinationRules for mTLS Traffic Policies
# These rules configure client-side mTLS settings

---
# Chain service destination rule
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: mys-chain
  namespace: mystira
spec:
  host: mys-chain.mystira.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 10s
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50

