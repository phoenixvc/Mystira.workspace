<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none">
  <!--
    Mystira Portal Frame: Hand-Drawn
    Style: Scalloped edges with small leaf ornaments at corners.
    Lighter, storybook-friendly — approachable and modern-ornamental.
    Thicker strokes to hold visual weight against the portal glow.
  -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B7530" stop-opacity="0.75"/>
      <stop offset="30%" stop-color="#6B5420" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#8B7530" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#5A4518" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#8B7530" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="goldHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A89050" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B7530" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="purpleReflect" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyanReflect" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="rimGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="80%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.06"/>
    </radialGradient>
    <filter id="fGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.4 0 0 0 0.3
                0.3 0 0 0 0.15
                0 0 0 0 0
                0 0 0 0.45 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.5 0 0 0 0.4
                0.35 0 0 0 0.2
                0 0 0 0 0
                0 0 0 0.55 0"/>
    </filter>
    <!-- Hand-drawn wobble effect on strokes -->
    <filter id="roughen" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Outer frame — scalloped border (hand-drawn waviness) -->
  <!-- Top edge scallops -->
  <path d="M 40 14 Q 60 6, 80 14 Q 100 6, 120 14 Q 140 6, 160 14 Q 180 6, 200 14 Q 220 6, 240 14 Q 260 6, 280 14 Q 300 6, 320 14 Q 340 6, 360 14"
        fill="none" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#fGlow)"
        class="frame-outer"/>
  <!-- Bottom edge scallops -->
  <path d="M 40 466 Q 60 474, 80 466 Q 100 474, 120 466 Q 140 474, 160 466 Q 180 474, 200 466 Q 220 474, 240 466 Q 260 474, 280 466 Q 300 474, 320 466 Q 340 474, 360 466"
        fill="none" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#fGlow)"/>
  <!-- Left edge scallops -->
  <path d="M 14 40 Q 6 65, 14 90 Q 6 115, 14 140 Q 6 165, 14 190 Q 6 215, 14 240 Q 6 265, 14 290 Q 6 315, 14 340 Q 6 365, 14 390 Q 6 415, 14 440"
        fill="none" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#fGlow)"/>
  <!-- Right edge scallops -->
  <path d="M 386 40 Q 394 65, 386 90 Q 394 115, 386 140 Q 394 165, 386 190 Q 394 215, 386 240 Q 394 265, 386 290 Q 394 315, 386 340 Q 394 365, 386 390 Q 394 415, 386 440"
        fill="none" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#fGlow)"/>

  <!-- Inner border — simple rounded rect with slight roughen -->
  <rect x="28" y="28" width="344" height="424" rx="12" ry="12"
        fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.55" filter="url(#roughen)"/>

  <!-- Inner bevel line -->
  <rect x="36" y="36" width="328" height="408" rx="8" ry="8"
        fill="none" stroke="url(#goldHL)" stroke-width="1.5" opacity="0.35"/>

  <!-- === CORNER ORNAMENTS — simple leaf clusters === -->

  <!-- Top-Left leaf cluster -->
  <g class="corner-ornament corner-tl" filter="url(#cGlow)">
    <!-- Three small leaves spreading from corner -->
    <path d="M 14 14 Q 22 6, 32 10 Q 24 14, 14 14" fill="url(#goldGrad)" opacity="0.6"/>
    <path d="M 14 14 Q 6 22, 10 32 Q 14 24, 14 14" fill="url(#goldGrad)" opacity="0.6"/>
    <path d="M 14 14 Q 24 8, 28 18 Q 20 16, 14 14" fill="url(#goldGrad)" opacity="0.5"/>
    <!-- Corner gem -->
    <circle cx="14" cy="14" r="5" fill="url(#goldGrad)"/>
    <circle cx="14" cy="14" r="2" fill="#A89050" opacity="0.85" class="gem-sparkle"/>
  </g>

  <!-- Top-Right leaf cluster -->
  <g class="corner-ornament corner-tr" filter="url(#cGlow)">
    <path d="M 386 14 Q 378 6, 368 10 Q 376 14, 386 14" fill="url(#goldGrad)" opacity="0.6"/>
    <path d="M 386 14 Q 394 22, 390 32 Q 386 24, 386 14" fill="url(#goldGrad)" opacity="0.6"/>
    <path d="M 386 14 Q 376 8, 372 18 Q 380 16, 386 14" fill="url(#goldGrad)" opacity="0.5"/>
    <circle cx="386" cy="14" r="5" fill="url(#goldGrad)"/>
    <circle cx="386" cy="14" r="2" fill="#A89050" opacity="0.85" class="gem-sparkle"/>
  </g>

  <!-- Bottom-Left leaf cluster -->
  <g class="corner-ornament corner-bl" filter="url(#cGlow)">
    <path d="M 14 466 Q 22 474, 32 470 Q 24 466, 14 466" fill="url(#goldGrad)" opacity="0.6"/>
    <path d="M 14 466 Q 6 458, 10 448 Q 14 456, 14 466" fill="url(#goldGrad)" opacity="0.6"/>
    <path d="M 14 466 Q 24 472, 28 462 Q 20 464, 14 466" fill="url(#goldGrad)" opacity="0.5"/>
    <circle cx="14" cy="466" r="5" fill="url(#goldGrad)"/>
    <circle cx="14" cy="466" r="2" fill="#A89050" opacity="0.85" class="gem-sparkle"/>
  </g>

  <!-- Bottom-Right leaf cluster -->
  <g class="corner-ornament corner-br" filter="url(#cGlow)">
    <path d="M 386 466 Q 378 474, 368 470 Q 376 466, 386 466" fill="url(#goldGrad)" opacity="0.6"/>
    <path d="M 386 466 Q 394 458, 390 448 Q 386 456, 386 466" fill="url(#goldGrad)" opacity="0.6"/>
    <path d="M 386 466 Q 376 472, 372 462 Q 380 464, 386 466" fill="url(#goldGrad)" opacity="0.5"/>
    <circle cx="386" cy="466" r="5" fill="url(#goldGrad)"/>
    <circle cx="386" cy="466" r="2" fill="#A89050" opacity="0.85" class="gem-sparkle"/>
  </g>

  <!-- === MID-EDGE ORNAMENTS — small flourish marks === -->

  <!-- Top center — small diamond with dots -->
  <g class="top-ornament" filter="url(#cGlow)">
    <path d="M 200 4 L 206 12 L 200 20 L 194 12 Z" fill="url(#goldGrad)" class="top-gem"/>
    <circle cx="182" cy="12" r="1.5" fill="url(#goldGrad)" opacity="0.5"/>
    <circle cx="218" cy="12" r="1.5" fill="url(#goldGrad)" opacity="0.5"/>
  </g>

  <!-- Bottom center -->
  <g class="bottom-ornament" filter="url(#cGlow)">
    <path d="M 200 460 L 206 468 L 200 476 L 194 468 Z" fill="url(#goldGrad)" class="bottom-gem"/>
    <circle cx="182" cy="468" r="1.5" fill="url(#goldGrad)" opacity="0.5"/>
    <circle cx="218" cy="468" r="1.5" fill="url(#goldGrad)" opacity="0.5"/>
  </g>

  <!-- Left center — small curl -->
  <path d="M 8 232 Q 2 240 8 248" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <circle cx="8" cy="240" r="2" fill="url(#goldGrad)" opacity="0.5"/>

  <!-- Right center — small curl -->
  <path d="M 392 232 Q 398 240 392 248" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <circle cx="392" cy="240" r="2" fill="url(#goldGrad)" opacity="0.5"/>

  <!-- Purple/cyan edge reflections -->
  <rect x="14" y="14" width="372" height="452" rx="16" ry="16"
        fill="none" stroke="url(#purpleReflect)" stroke-width="1.5"
        class="frame-reflection-purple"/>
  <rect x="14" y="14" width="372" height="452" rx="16" ry="16"
        fill="none" stroke="url(#cyanReflect)" stroke-width="1.5"
        class="frame-reflection-cyan"/>

  <!-- Inner rim glow -->
  <rect x="34" y="34" width="332" height="412" rx="10" ry="10"
        fill="url(#rimGlow)" class="inner-rim-glow"/>
</svg>
