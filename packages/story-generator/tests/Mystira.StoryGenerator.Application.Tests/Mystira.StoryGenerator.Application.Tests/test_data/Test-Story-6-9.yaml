  - id: ending_1c_messy
    type: special
    title: 'Ending: The Simple Grey Stone'
    description: '''You follow Shelly to the river. She finds a lovely, simple grey stone and holds it out. "I wanted you to have something for your kindness to Timothy," she says. As Maple holds the simple stone, it feels a little heavy in his paw. He can''t help but think of the sticky path and the unhappy little bunny. The friends were happy they helped Timothy, but Maple knew they had left a problem behind for someone else.'
