  - id: ending_3_unsolved
    type: special
    title: 'Ending: The Unsolved Mystery'
    description: 'The sun sets, and the friends are tired with no more clues. They never found out what happened to the Glow-Berries. They learned an important lesson: sometimes, even with your best efforts, a mystery can be too tricky. A single missed clue can mean the difference between solving the puzzle and the trail going cold.'
