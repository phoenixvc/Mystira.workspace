title: The Mystery of the Missing Glow-Berries
description: Four friends from Whispering Woods discover the special Glow-Berries are gone! They must work together, follow clues, and learn about fairness and empathy to solve the mystery.
tags:
  - mystery
  - animals
  - friendship
  - social_awareness
  - empathy
difficulty: Hard
session_length: Long
age_group: 6-9
minimum_age: 6
archetypes:
  - the_innovator
  - the_architect
  - the_pathfinder
  - the_steward
core_axes:
  - Empathy & Perspective-Taking
  - Demonstrating Empathy and Compassion
  - Recognizing Situational Demands and Opportunities
characters:
  - id: archimedes
    name: Archimedes
    image: image-owl-archimedes-younger-kids-doid-2bd183dc
    audio:
    metadata:
      role:
        - Thinker
        - Logic Builder
