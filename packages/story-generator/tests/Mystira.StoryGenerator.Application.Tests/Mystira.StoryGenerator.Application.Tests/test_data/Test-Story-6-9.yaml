  - id: ending_2_lesson
    type: special
    title: 'Ending: A Lesson in Kindness'
    description: The friends watch the last berry float away. Jinx’s ears droop. 'I made a mistake,' he admits. 'I cared more about grabbing the berries than I did about Shelly's feelings.' Maple puts a friendly paw on his shoulder. 'It is okay,' he says. 'We learned something big today. Being kind is always more important than winning the mission.'
