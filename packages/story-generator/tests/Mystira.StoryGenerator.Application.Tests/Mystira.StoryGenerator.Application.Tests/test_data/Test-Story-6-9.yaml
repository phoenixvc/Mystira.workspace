    title: 'Ending: The Shimmering Stone (Perfect)'
    description: |-
      Shelly reaches into the water and pulls out a beautiful stone that shimmers with its own inner light.

      "This is for you," she says. "For being so kind, brave, and responsible. You saved my friend. Please take this to remember the wonderful friend you are."

      In the end, you did more than solve a mystery. You brought warmth and light to a friend in need, discovering that the greatest treasure is a kind and caring heart.
