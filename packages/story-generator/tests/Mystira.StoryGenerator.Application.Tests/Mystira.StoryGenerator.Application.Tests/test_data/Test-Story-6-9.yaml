      backstory: Raised by forest keepers, Maple learned that calm words steady storm-tossed tempers; he prioritizes group harmony above all else.
scenes:
  - id: scene_1_start
    type: narrative
    title: The Empty Bush
    description: The sun dappled through the leaves of Whispering Woods. Archimedes the owl hooted from his branch, ready for a tasty Glow-Berry. But the bush where the sweetest, brightest berries grew was empty! 'Hoo-hoo!' he called. 'The Glow-Berries are all gone!'
    next_scene: scene_2_nutmegs_clue
    media:
      video: video-scene1start-doid-a1913d52
  - id: scene_2_nutmegs_clue
    type: narrative
    title: Nutmeg's Clue
    description: Nutmeg the squirrel hurried down a nearby tree. 'Gone? That's nutty! I saw someone big and grumpy stomping around here this morning. He was sniffing the berry bush!'
    next_scene: scene_3_focus_choice_archimedes
    media:
      image: image-scene2nutmegsclue-doid-6dce1f7a
  - id: scene_3_focus_choice_archimedes
    type: choice
    title: What Should We Do First? (Focus Choice)
    description: Jinx is eager to start the hunt, his ears flicking with excitement. 'A mystery!' he says. But Nutmeg looks very flustered about what he saw. **[c:Archimedes] playing Archimedes, you have a difficult choice. Do you stop to comfort your worried friend, or do you start searching the ground immediately?**
    branches:
      - choice: Comfort Nutmeg first so he feels safe to remember.
        next_scene: scene_3a_ask_witness
        compass_change:
          axis: Recognizing Situational Demands and Opportunities
          delta: 0.8
          developmental_link: 2.1.2 Social Skills (Social Awareness & Relationship Skills)
        echo_log:
          echo_type: the_steward
          description: The player prioritized the social demand (calming a friend) over the immediate task.
          strength: 1
      - choice: Search the ground immediately to catch the trail before it fades.
        next_scene: scene_3b_search_for_tracks
        compass_change:
          axis: Recognizing Situational Demands and Opportunities
          delta: 0.8
          developmental_link: 2.1.2 Social Skills (Social Awareness & Relationship Skills)
        echo_log:
          echo_type: the_innovator
          description: The player prioritized the logical demand (preserving evidence) over the social cue.
          strength: 1
    media:
      image: image-scene3focuschoicereasoning-doid-7af87965
  - id: scene_3a_ask_witness
    type: narrative
    title: A Flustered Friend
    description: Archimedes turns to Nutmeg gently. 'Tell us everything you remember,' he asks gently. Nutmeg tries to think, but his tail starts twitching wildly. 'He was... he was so big!' he says, looking very flustered. Maple sees his friend is struggling and steps closer to help.
    next_scene: roll_1_calm_witness
    media:
      image: image-scene3aaskwitness-doid-f185f6b9
  - id: scene_3b_search_for_tracks
    type: narrative
    title: Searching the Scene
    description: Archimedes decides the mission must come first. 'We need to find the trail before it fades!' he says. Jinx gets down low, sniffing the soft dirt around the bush for any tracks.
    next_scene: roll_2_investigate
    media:
      image: image-scene3bsearchfortracks-doid-213d2cb1
  - id: roll_1_calm_witness
    type: roll
    title: A Gentle Voice
    description: Maple speaks in a low, soothing rumble. **[c:Maple] playing Maple, roll a 9 or higher to help Nutmeg take a deep breath and feel safe.**
    difficulty: 9
    branches:
      - choice: It worked!
        next_scene: scene_calm_witness_success
      - choice: He's still too scared!
        next_scene: scene_calm_witness_failure
    media:
      image: image-roll1calmwitness-doid-1539965d
  - id: roll_2_investigate
    type: roll
    title: Searching for Tracks
    description: 'Jinx looks for tracks in soft dirt. **[c: Jinx] playing Jinx, roll to see if you can spot a clear trail. You need an 8 or higher.**'
    difficulty: 8
    branches:
      - choice: Aha, tracks!
        next_scene: scene_investigate_success
      - choice: Just a bunch of smudges.
        next_scene: scene_investigate_failure
  - id: scene_calm_witness_success
    type: narrative
    title: A Clear Memory
    description: Maple's calm voice works. Nutmeg takes a deep breath and says, 'He had big paws, brown fur, and a very, very grumpy face.' The clues point to Grumble the bear.
    next_scene: scene_choice_approach_with_witness_clue
  - id: scene_calm_witness_failure
    type: narrative
    title: A Confusing Clue
    description: Nutmeg is still hopping around nervously. He tries to speak, but the words come out too fast! 'It was... big! And fuzzy! And stompy!' he says. Archimedes nods wisely. 'The biggest, grumpiest animal who lives near here is Grumble the bear. Maybe we should ask *him*.'
    next_scene: scene_choice_approach_with_no_clue
  - id: scene_investigate_success
    type: narrative
    title: Bear Prints!
    description: Jinx's sharp eyes spot them. 'Big paw prints in the soft dirt! And they look like... bear prints!' The tracks lead toward the den of Grumble the bear.
    next_scene: scene_choice_approach_with_track_clue
    media:
      image: image-sceneinvestigatesuccess-doid-15b61dc4
  - id: scene_investigate_failure
    type: narrative
    title: Messy Tracks
    description: The ground is a mess of dirt and leaves. 'I see some smudges,' Jinx says, 'but I can't tell who made them.' With no clear trail to follow, Maple suggests a new plan. 'Grumble the bear lives nearby,' he says. 'He might be the only one who saw something. We should ask him.'
    next_scene: scene_choice_approach_with_no_clue
  - id: scene_choice_approach_with_witness_clue
    type: choice
    title: The Suspect (Micro-Choice)
    description: The friends have a strong clue pointing to Grumble. **[c:Jinx] playing as Jinx, you are leading the way. How do you want to approach the den?**
    branches:
      - choice: March over and accuse Grumble right away!
        next_scene: scene_narrative_accuse_from_witness
        compass_change:
          axis: Empathy & Perspective-Taking
          delta: -0.2
          developmental_link: 2.1.2 Social Skills (Social Awareness & Relationship Skills)
        echo_log:
          echo_type: the_leaper
          description: The player chose to accuse without considering the suspect's perspective first.
          strength: -1
      - choice: Approach cautiously and ask him politely first.
        next_scene: scene_narrative_ask_from_witness
        compass_change:
          axis: Empathy & Perspective-Taking
          delta: 0.2
          developmental_link: 2.1.2 Social Skills (Social Awareness & Relationship Skills)
        echo_log:
          echo_type: the_steward
          description: The player chose to seek perspective before judging.
          strength: 1
  - id: scene_choice_approach_with_track_clue
    type: choice
    title: The Suspect (Micro-Choice)
    description: The tracks seem to lead right to Grumble's den. **[c:Jinx] playing as Jinx, you are leading the way. How do you want to approach the den?**
    branches:
      - choice: Follow the tracks and accuse Grumble!
        next_scene: scene_narrative_accuse_from_tracks
        compass_change:
          axis: Empathy & Perspective-Taking
          delta: -0.2
          developmental_link: 2.1.2 Social Skills (Social Awareness & Relationship Skills)
        echo_log:
          echo_type: the_leaper
          description: The player chose to accuse without considering the suspect's perspective first.
          strength: -1
      - choice: Be careful and ask him politely what happened.
        next_scene: scene_narrative_ask_from_tracks
        compass_change:
          axis: Empathy & Perspective-Taking
          delta: 0.2
          developmental_link: 2.1.2 Social Skills (Social Awareness & Relationship Skills)
        echo_log:
          echo_type: the_steward
          description: The player chose to seek perspective before judging.
          strength: 1
    media:
      image: image-scenechoiceapproachwithtrackclue-doid-85a44ecd
  - id: scene_choice_approach_with_no_clue
    type: choice
    title: A Grumpy Neighbor (Micro-Choice)
    description: With no solid clues, the friends must talk to Grumble. **[c:Jinx] playing as Jinx, you are leading the way. How do you want to approach the den?**
    branches:
      - choice: Go and boldly demand to know what he saw.
        next_scene: scene_narrative_accuse_with_no_clue
        compass_change:
          axis: Empathy & Perspective-Taking
          delta: -0.2
          developmental_link: 2.1.2 Social Skills (Social Awareness & Relationship Skills)
        echo_log:
          echo_type: the_leaper
          description: The player chose to accuse without considering the suspect's perspective first.
          strength: -1
      - choice: Go and politely ask if he saw anything.
        next_scene: scene_narrative_ask_with_no_clue
        compass_change:
          axis: Empathy & Perspective-Taking
          delta: 0.2
          developmental_link: 2.1.2 Social Skills (Social Awareness & Relationship Skills)
        echo_log:
          echo_type: the_steward
          description: The player chose to seek perspective before judging.
          strength: 1
  - id: scene_narrative_accuse_from_witness
    type: narrative
    title: Marching to Accuse
    description: Believing Nutmeg's description, the friends march to Grumble's den. Jinx whispers, 'Okay, I'll shout at him to come out!'
    next_scene: roll_3a_confront
    media:
      image: image-scenenarrativeaccusefromwitness-doid-17fc99cc
  - id: scene_narrative_ask_from_witness
    type: narrative
    title: A Moment of Thought
    description: Jinx stops himself. 'Wait,' he says. 'If we just shout, he'll only get angrier.' He turns to Maple. 'You are the best at talking to grumpy folks. Can you ask him nicely?' Maple nods. 'I'll try my best.'
    next_scene: roll_3b_polite_from_witness
    media:
      image: image-scenenarrativeaskfromwitness-doid-6ec33260
  - id: scene_narrative_accuse_from_tracks
    type: narrative
    title: Following the Trail
    description: '''The tracks end at Grumble''s den. ''This is it!'' Jinx says. ''I''ll get him out here and we''ll get the truth!'''
    next_scene: roll_3a_confront
    media:
      image: image-scenenarrativeaccusefromtracks-doid-17fc99cc
  - id: scene_narrative_ask_from_tracks
    type: narrative
    title: A Cautious Approach
    description: Jinx looks at the tracks and shakes his head. 'We can't just barge in,' he decides. 'Maple, you go. He might listen to another bear.' Maple nods calmly. 'Good idea. I will be very polite.'
    next_scene: roll_3b_polite_from_tracks
    media:
      image: image-scenenarrativeaskfromtracks-doid-6ec33260
  - id: scene_narrative_accuse_with_no_clue
    type: narrative
    title: A Bold Demand
    description: Jinx decides a loud approach is best. 'He has to tell us what he saw!' he declares as they reach the den.
    next_scene: roll_3a_confront
    media:
      image: image-scenenarrativeaccusewithnoclue-doid-17fc99cc
  - id: scene_narrative_ask_with_no_clue
    type: narrative
    title: A Kind Question
    description: Jinx realizes they don't have any proof. 'We can't accuse him if we aren't sure,' he says. 'Maple, you ask him. Keep it friendly!' Maple smiles. 'A kind question is always a good start.'
    next_scene: roll_3b_polite_from_witness
    media:
      image: image-scenenarrativeaskwithnoclue-doid-6ec33260
  - id: roll_3a_confront
    type: roll
    title: Confronting Grumble
    description: Jinx shouts at Grumble's den. **[c:Jinx] playing Jinx, roll an 11 or higher to get his attention without making him furious.**
    difficulty: 14
    branches:
      - choice: It worked! He's coming out!
        next_scene: scene_confront_success
      - choice: Uh oh... that just made him angrier!
        next_scene: scene_confront_failure
  - id: roll_3b_polite_from_witness
    type: roll
    title: A Polite Question
    description: Maple bravely steps forward. **[c:Maple] playing Maple, roll an 8 or higher to convince Grumble to talk.**
    difficulty: 8
    branches:
      - choice: I think it's working...
        next_scene: scene_polite_success_from_witness
      - choice: He's ignoring us.
        next_scene: scene_polite_failure_A
  - id: roll_3b_polite_from_tracks
    type: roll
    title: A Polite Question
    description: Maple bravely steps forward. **[c:Maple] playing Maple, roll an 8 or higher to convince Grumble to talk.**
    difficulty: 8
    branches:
      - choice: I think it's working...
        next_scene: scene_polite_success_from_tracks
      - choice: He's ignoring us.
        next_scene: scene_polite_failure_B
  - id: scene_confront_success
    type: narrative
    title: The Accusation
    description: Grumble pokes his head out, looking annoyed. Jinx steps forward. 'The Glow-Berries are gone, and we think you took them!'
    next_scene: scene_grumbles_denial
    media:
      image: image-sceneconfrontsuccess-doid-06237a9e
  - id: scene_confront_failure
    type: narrative
    title: A Loud Roar
    description: 'Grumble answers with loud ROAR: ''GO AWAY! YOU''RE DISTURBING MY NAP!'' He refuses to come out. Their bold approach failed.'
    next_scene: scene_dead_end_after_confront_fail
    media:
      image: image-sceneconfrontfailure-doid-85a44ecd
      audio: audio-sceneconfrontfailure-doid-5d0ae420
  - id: scene_polite_success_from_witness
    type: narrative
    title: Grumble's Clue
    description: Grumble peeks out. 'Hmmph. I didn't take any berries. But I did see little Shelly the turtle rolling something glowing towards the Mossy Log that crosses the Babbling Creek.'
    next_scene: scene_contradiction_intro
    media:
      image: image-scenepolitesuccessfromwitness-doid-45445eed
  - id: scene_polite_success_from_tracks
    type: narrative
    title: Grumble's Clue
    description: Grumble peeks out. 'Hmmph. I didn't take any berries. But I did see little Shelly the turtle rolling something glowing towards the Mossy Log that crosses the Babbling Creek.'
    next_scene: scene_puzzle_out_tracks_vs_witness
    media:
      image: image-scenepolitesuccessfromtracks-doid-45445eed
  - id: scene_polite_failure_A
    type: narrative
    title: No Help Here
    description: Grumble grunts from inside his den. 'Not now. Busy.' He doesn't come out. Maple nods calmly. 'He is just too busy to talk,' he says. 'We were right to be polite, but we will have to find another way.'
    next_scene: scene_dead_end_after_polite_fail
    media:
      image: image-scenepolitefailurea-doid-85a44ecd
      audio: audio-scenepolitefailurea-doid-f49927dc
  - id: scene_polite_failure_B
    type: narrative
    title: No Help Here
    description: Grumble grunts from inside his den. 'Not now. Busy.' He doesn't come out. Maple nods calmly. 'He is just too busy to talk,' he says. 'We were right to be polite, but we will have to find another way.'
    next_scene: scene_dead_end_after_polite_fail
    media:
      image: image-scenepolitefailureb-doid-85a44ecd
      audio: audio-scenepolitefailureb-doid-f49927dc
  - id: scene_grumbles_denial
    type: narrative
    title: Grumble's Alibi
    description: Grumble seems confused. He holds up two huge paws covered in sticky honeycomb. 'Glow-Berries? I've been getting this honeycomb all morning. Look at this mess!' The friends feel silly for accusing him.
    next_scene: roll_4_sincere_apology
    media:
      image: image-scenegrumblesdenial-doid-80590662
  - id: scene_dead_end_after_confront_fail
    type: narrative
    title: Back to the Start
    description: With Grumble too angry to talk, the friends have no choice but to return to the empty bush to search for clues one last time.
    next_scene: roll_5a_perception_after_anger
  - id: scene_dead_end_after_polite_fail
    type: narrative
    title: Back to Square One
    description: With Grumble unwilling to help, the friends are back where they started. They decide to search the area around the bush one more time.
    next_scene: roll_5b_perception_after_refusal
    media:
      image: image-scenedeadendafterpolitefail-doid-9463676d
  - id: scene_contradiction_intro
    type: narrative
    title: A Puzzle
    description: The friends huddle together. 'This is strange,' Jinx whispers. 'Nutmeg was sure he saw a big bear, but Grumble says he saw a turtle.'
    next_scene: scene_puzzle_out_clues
  - id: scene_puzzle_out_clues
    type: narrative
    title: A Theory
    description: '''Wait!'' Archimedes hooted softly. ''What if it''s not *who* is right, but *when* they were right? Maybe the stomper came this morning, but Shelly took the berries this afternoon!'''
    next_scene: scene_nutmeg_confirms
  - id: scene_nutmeg_confirms
    type: narrative
    title: A Realization
    description: Maple turned to Nutmeg. 'When exactly did you see the stomper?' Nutmeg's eyes went wide. 'It was early this morning! And Archimedes is right—the berries were still on the bush then!' Jinx nodded. 'So Nutmeg saw Grumble in the morning, and Grumble saw Shelly in the afternoon! Let's go to the Mossy Log!'
    next_scene: scene_journey_to_log_with_goal
  - id: scene_puzzle_out_tracks_vs_witness
    type: narrative
    title: Tracks vs. Testimony
    description: '"This is confusing," says Jinx. "The tracks we found are from a bear. But Grumble says he saw a turtle. How can both be right?" Archimedes hooted thoughtfully. "Maybe they are. The tracks could have been made this morning when the berries were still here, and Shelly the turtle could have taken them later in the day. The clues might not be from the same time!"'
    next_scene: scene_journey_to_log_with_goal
  - id: roll_4_sincere_apology
    type: roll
    title: A Sincere Apology
    description: Maple steps forward to apologize for the false accusation. **[c:Maple] playing Maple, roll a 10 or higher to show you're truly sorry.**
    difficulty: 10
    branches:
      - choice: He accepted our apology!
        next_scene: scene_apology_success
      - choice: He's still too grumpy!
        next_scene: scene_apology_failure
    media:
      image: image-roll4sincereapology-doid-e2a3c509
  - id: roll_5a_perception_after_anger
    type: roll
    title: Searching for a Faint Trail
    description: Back at the bush, Archimedes flies to a high branch, scanning the ground for anything they missed. **[c:Archimedes] playing Archimedes, roll a 12 or higher to spot the tiny details!**
    difficulty: 12
    branches:
      - choice: Hoo-hoo! I see something!
        next_scene: scene_perception_success_A
      - choice: Hmm, nothing but leaves.
        next_scene: scene_perception_failure_A
    media:
      image: image-roll5aperceptionafteranger-doid-3d176895
  - id: roll_5b_perception_after_refusal
    type: roll
    title: Searching for a Faint Trail
    description: Back at the bush, Archimedes flies to a high branch, scanning the ground for anything they missed. **[c:Archimedes] playing Archimedes, roll a 12 or higher to spot the tiny details!**
    difficulty: 12
    branches:
      - choice: Hoo-hoo! I see something!
        next_scene: scene_perception_success_B
      - choice: Hmm, nothing but leaves.
        next_scene: scene_last_hope
    media:
      image: image-roll5bperceptionafterrefusal-doid-3d176895
  - id: scene_journey_to_log_with_goal
    type: narrative
    title: A New Plan
    description: '''Okay team,'' says Maple. ''We need to find Shelly at the Mossy Log!'' ''To the Babbling Creek!'' Jinx adds, and the friends set off.'
    next_scene: scene_approach_creek_A
  - id: scene_apology_success
    type: narrative
    title: Apology Accepted
    description: Grumble huffed, but a tiny smile appeared. 'Fine. I did see Shelly the turtle heading to the Mossy Log that crosses the Babbling Creek.' The friends thank him and set off with their new clue.
    next_scene: scene_journey_to_log_with_goal
    media:
      image: image-sceneapologysuccess-doid-282fd4af
  - id: scene_apology_failure
    type: narrative
    title: Apology Rejected
    description: '''Sorry isn''t good enough!'' Grumble snorts and retreats into his den. The apology failed.'
    next_scene: scene_choice_after_failed_apology
    media:
      image: image-sceneapologyfailure-doid-85a44ecd
  - id: scene_perception_success_A
    type: narrative
    title: A Tiny Clue!
    description: From his high branch, Archimedes hoots, 'Hoo-hoo, look there!' He points to a faint, shiny trail leading away from the bush.
    next_scene: scene_approach_creek_B
    media:
      image: image-sceneperceptionsuccessa-doid-4c88278e
  - id: scene_perception_failure_A
    type: narrative
    title: Nowhere Left to Look
    description: The friends search and search, but find nothing. They've run out of ideas. Because they were unkind to Grumble, they missed their only other clue, and the trail has gone cold.
    next_scene: ending_3_unsolved
  - id: scene_perception_success_B
    type: narrative
    title: A Tiny Clue!
    description: Just as he's about to give up, Archimedes spots it! He points to a faint, shiny trail on the ground.
    next_scene: scene_approach_creek_B
    media:
      image: image-sceneperceptionsuccessb-doid-4c88278e
  - id: scene_last_hope
    type: narrative
    title: A Last Hope
    description: The friends search and search, but find nothing. Shoulders slumping, they are about to give up when Nutmeg suddenly says, 'Wait! Look!' He points to a faint, shiny trail on the ground they had all missed.
    next_scene: scene_approach_creek_B
    media:
      image: image-scenelasthope-doid-f9afe4d9
  - id: scene_choice_after_failed_apology
    type: choice
    title: Amends or Abandon?
    description: Grumble has retreated into his den, still angry. Maple, your apology didn't work. As the group's peacemaker, what's your next move? [c:Maple] playing Maple, you decide.
    branches:
      - choice: Leave a basket of pretty forest treasures at his door to show you're truly sorry.
        next_scene: narrative_gift
        compass_change:
          axis: Demonstrating Empathy and Compassion
          delta: 0.8
          developmental_link: 2.1.2 Social Skills (Social Awareness & Relationship Skills)
        echo_log:
          echo_type: the_steward
          description: The player moved from understanding to action by leaving a gift.
          strength: 1
      - choice: Give up on him and search for clues on your own.
        next_scene: scene_dead_end_after_apology_fail
        compass_change:
          axis: Demonstrating Empathy and Compassion
          delta: -0.5
          developmental_link: 2.1.2 Social Skills (Social Awareness & Relationship Skills)
        echo_log:
          echo_type: the_conflict_avoider
          description: The player gave up on repairing the relationship.
          strength: -1
  - id: scene_approach_creek_A
    type: narrative
    title: Journey to the Mossy Log
    description: Knowing where to go, the friends head directly to the Babbling Creek. They see the giant, ancient log stretching across the water, providing a slippery bridge to the other side.
    next_scene: roll_6a_creek_crossing
    media:
      image: image-sceneapproachcreeka-doid-a1d7e678
  - id: scene_approach_creek_B
    type: narrative
    title: Following a Mysterious Trail
    description: It's their only clue. The friends follow the faint, shiny trail through the woods until they arrive at the edge of the Babbling Creek and a giant, mossy log.
