# Codecov Configuration for Mystira Workspace
# https://docs.codecov.io/docs/codecovyml-reference

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: 80%
        threshold: 2% # Allow 2% drop before failing
        informational: false
    patch:
      default:
        target: 80%
        threshold: 5% # Allow more flexibility on individual PRs
        informational: false

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "header, diff, flags, components, tree, footer"
  behavior: default
  require_changes: false
  require_base: true
  require_head: true
  hide_project_coverage: false

# Ignore generated code and test files
ignore:
  # .NET ignores
  - "**/*.g.cs"
  - "**/*Tests*/**"
  - "**/obj/**"
  - "**/bin/**"
  - "**/*.Designer.cs"
  - "**/Migrations/**"
  # TypeScript ignores
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/coverage/**"
  - "**/*.d.ts"

# Flag configurations for different components
flags:
  # TypeScript packages
  typescript:
    paths:
      - packages/shared-utils/
      - packages/admin-ui/
      - packages/publisher/
    carryforward: true

  # .NET packages
  dotnet-core:
    paths:
      - packages/core/Mystira.Core/
    carryforward: true

  dotnet-shared:
    paths:
      - packages/shared/Mystira.Shared/
    carryforward: true

  dotnet-domain:
    paths:
      - packages/domain/Mystira.Domain/
    carryforward: true

  dotnet-application:
    paths:
      - packages/application/Mystira.Application/
    carryforward: true

  dotnet-contracts:
    paths:
      - packages/contracts/dotnet/Mystira.Contracts/
    carryforward: true

  dotnet-admin-api:
    paths:
      - packages/admin-api/
    carryforward: true

  dotnet-app:
    paths:
      - packages/app/
    carryforward: true

# Component configuration for better PR comments
component_management:
  default_rules:
    statuses:
      - type: project
        target: 80%
  individual_components:
    - component_id: typescript-packages
      name: TypeScript Packages
      paths:
        - packages/shared-utils/**
        - packages/admin-ui/**
        - packages/publisher/**
    - component_id: dotnet-core
      name: .NET Core
      paths:
        - packages/core/**
    - component_id: dotnet-shared
      name: .NET Shared
      paths:
        - packages/shared/**
    - component_id: dotnet-domain
      name: .NET Domain
      paths:
        - packages/domain/**
    - component_id: dotnet-application
      name: .NET Application
      paths:
        - packages/application/**
    - component_id: dotnet-contracts
      name: .NET Contracts
      paths:
        - packages/contracts/**
    - component_id: admin-api
      name: Admin API
      paths:
        - packages/admin-api/**
    - component_id: app
      name: App
      paths:
        - packages/app/**
    - component_id: app-api
      name: App API
      paths:
        - packages/app/src/Mystira.App.Api/**
    - component_id: app-admin-api
      name: App Admin API
      paths:
        - packages/app/src/Mystira.App.Admin.Api/**
    - component_id: app-pwa
      name: App PWA
      paths:
        - packages/app/src/Mystira.App.PWA/**
    - component_id: app-domain
      name: App Domain
      paths:
        - packages/app/src/Mystira.App.Domain/**
    - component_id: app-application
      name: App Application
      paths:
        - packages/app/src/Mystira.App.Application/**
    - component_id: app-contracts
      name: App Contracts
      paths:
        - packages/app/src/Mystira.Contracts.App/**
    - component_id: app-infrastructure-data
      name: App Infrastructure Data
      paths:
        - packages/app/src/Mystira.App.Infrastructure.Data/**
    - component_id: app-infrastructure-azure
      name: App Infrastructure Azure
      paths:
        - packages/app/src/Mystira.App.Infrastructure.Azure/**
    - component_id: app-infrastructure-discord
      name: App Infrastructure Discord
      paths:
        - packages/app/src/Mystira.App.Infrastructure.Discord/**
    - component_id: app-infrastructure-storyprotocol
      name: App Infrastructure StoryProtocol
      paths:
        - packages/app/src/Mystira.App.Infrastructure.StoryProtocol/**
    - component_id: app-shared
      name: App Shared
      paths:
        - packages/app/src/Mystira.App.Shared/**
