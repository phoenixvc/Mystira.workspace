name: "[CI] Mystira.Contracts"

on:
  push:
    paths:
      - 'packages/contracts/**'
      - 'packages/domain/**'
      - '.github/workflows/packages-contracts.yml'
    branches:
      - main
      - 'release/**'
  pull_request:
    paths:
      - 'packages/contracts/**'
      - 'packages/domain/**'
      - '.github/workflows/packages-contracts.yml'

concurrency:
  group: packages-contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          source-url: https://nuget.pkg.github.com/phoenixvc/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build Mystira.Contracts
        run: dotnet build packages/contracts/dotnet/Mystira.Contracts --configuration Release

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          source-url: https://nuget.pkg.github.com/phoenixvc/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Restore packages
        run: dotnet restore packages/contracts/dotnet/Mystira.Contracts

      - name: Check for vulnerable packages
        run: |
          echo "## Vulnerability Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          RESULT=$(dotnet list packages/contracts/dotnet/Mystira.Contracts package --vulnerable --include-transitive 2>&1)
          EXIT_CODE=$?

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Failed to check vulnerabilities in Mystira.Contracts"
            echo "### ❌ Command Failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$RESULT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if echo "$RESULT" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected in Mystira.Contracts"
            echo "### ⚠️ Vulnerable Packages Found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$RESULT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "### ✅ No Vulnerabilities Found" >> $GITHUB_STEP_SUMMARY
            echo "No known vulnerabilities detected in dependencies." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          config-file: '.github/dependency-review-config.yml'
