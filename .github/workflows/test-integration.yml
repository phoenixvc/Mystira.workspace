name: "[Test] Integration"

on:
  push:
    branches: [dev, main]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.sln"
      - "nuget.config"
      - ".github/workflows/test-integration.yml"
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: test-integration-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  unit-tests:
    name: Wait for Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check unit tests status
        run: echo "Integration tests run after unit tests pass"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mystira_admin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=mystira_admin_test;Username=test;Password=test"
      ConnectionStrings__Redis: "localhost:6379"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
          source-url: https://nuget.pkg.github.com/phoenixvc/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U test; do
            sleep 1
          done
          echo "PostgreSQL is ready"

          echo "Waiting for Redis..."
          until redis-cli -h localhost ping | grep -q PONG; do
            sleep 1
          done
          echo "Redis is ready"

      - name: Run integration tests
        run: |
          dotnet test --no-restore --verbosity normal \
            --filter "Category=Integration" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover,cobertura
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        with:
          name: integration-coverage-reports
          path: ./coverage
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          files: "**/*.cobertura.xml,**/*.opencover.xml"
          flags: integration
          name: mystira-admin-api-integration
          fail_ci_if_error: false
          verbose: true

      - name: Generate test summary
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "- PostgreSQL 16" >> $GITHUB_STEP_SUMMARY
          echo "- Redis 7" >> $GITHUB_STEP_SUMMARY
