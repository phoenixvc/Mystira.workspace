name: "[Test] Integration"

on:
  # Trigger after unit tests complete
  workflow_run:
    workflows: ["[Test] Unit"]
    types: [completed]
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: test-integration-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only run if unit tests succeeded
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    env:
      NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mystira_admin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=mystira_admin_test;Username=test;Password=test"
      ConnectionStrings__Redis: "localhost:6379"

    steps:
      - name: Download artifact from triggering workflow
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@v8
        with:
          script: |
            console.log('Unit tests passed, proceeding with integration tests');
            console.log('Triggered by:', '${{ github.event.workflow_run.html_url }}');

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
          source-url: https://nuget.pkg.github.com/phoenixvc/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U test; do
            sleep 1
          done
          echo "PostgreSQL is ready"

          echo "Waiting for Redis..."
          until redis-cli -h localhost ping | grep -q PONG; do
            sleep 1
          done
          echo "Redis is ready"

      - name: Run integration tests
        run: |
          dotnet test --no-restore --verbosity normal \
            --filter "Category=Integration" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover,cobertura
        continue-on-error: ${{ github.event.workflow_run.head_branch != 'main' && github.ref != 'refs/heads/main' }}

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        with:
          name: integration-coverage-reports
          path: ./coverage
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          files: "**/*.cobertura.xml,**/*.opencover.xml"
          flags: integration
          name: mystira-admin-api-integration
          fail_ci_if_error: false
          verbose: true

      - name: Generate test summary
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.event.workflow_run.head_branch || github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.event.workflow_run.head_sha || github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ github.event.workflow_run.conclusion || 'manual' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "- PostgreSQL 16" >> $GITHUB_STEP_SUMMARY
          echo "- Redis 7" >> $GITHUB_STEP_SUMMARY

  skipped:
    name: Integration Tests (Skipped)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion != 'success'
    steps:
      - name: Report skip reason
        run: |
          echo "## Integration Tests Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Unit tests did not pass. Integration tests require successful unit tests." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Test Result | ${{ github.event.workflow_run.conclusion }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Test Run | ${{ github.event.workflow_run.html_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "::warning::Integration tests skipped because unit tests ${{ github.event.workflow_run.conclusion }}"
