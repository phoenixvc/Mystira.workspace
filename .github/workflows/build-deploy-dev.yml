name: "StoryGenerator: Build & Deploy Dev"

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  AZURE_CONTAINER_REGISTRY: myssharedacr
  IMAGE_NAME: story-generator

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  # ============================================
  # CI Jobs (run in parallel for fast feedback)
  # ============================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes --verbosity diagnostic

  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

  # ============================================
  # Build and Push Docker Image
  # ============================================

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Only build/push on push to branch (not PRs)
    if: github.event_name != 'pull_request'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=dev-
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/Mystira.StoryGenerator.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NUGET_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}

  # ============================================
  # Trigger API Deployment (Dev Only)
  # ============================================

  trigger-api-deploy:
    name: Trigger API Deployment
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only deploy on push to dev or manual dispatch
    if: |
      needs.build-and-push.result == 'success' &&
      github.ref == 'refs/heads/dev' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Trigger API deployment via workspace
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MYSTIRA_GITHUB_SUBMODULE_ACCESS_TOKEN }}
          repository: phoenixvc/Mystira.workspace
          event-type: story-generator-deploy
          client-payload: |
            {
              "environment": "dev",
              "ref": "${{ github.sha }}",
              "triggered_by": "${{ github.actor }}",
              "run_id": "${{ github.run_id }}",
              "repository": "${{ github.repository }}",
              "image_tag": "dev-${{ github.sha }}",
              "pr_number": ""
            }

  # ============================================
  # Build and Deploy SWA (Blazor WASM)
  # ============================================

  build-and-deploy-swa:
    name: Build & Deploy SWA
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Only deploy on push to dev or manual dispatch
    if: |
      github.ref == 'refs/heads/dev' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Restore
        run: dotnet restore src/Mystira.StoryGenerator.Web/Mystira.StoryGenerator.Web.csproj

      - name: Build Blazor WASM
        run: dotnet publish src/Mystira.StoryGenerator.Web/Mystira.StoryGenerator.Web.csproj -c Release -o publish

      - name: Deploy to Azure Static Web Apps
        id: swa-deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: publish/wwwroot
          skip_app_build: true

  # ============================================
  # Trigger SWA Workspace Update (Dev Only)
  # ============================================

  trigger-swa-deploy:
    name: Trigger SWA Workspace Update
    runs-on: ubuntu-latest
    needs: build-and-deploy-swa
    if: needs.build-and-deploy-swa.result == 'success'
    steps:
      - name: Trigger SWA update via workspace
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MYSTIRA_GITHUB_SUBMODULE_ACCESS_TOKEN }}
          repository: phoenixvc/Mystira.workspace
          event-type: story-generator-swa-deploy
          client-payload: |
            {
              "environment": "dev",
              "ref": "${{ github.sha }}",
              "triggered_by": "${{ github.actor }}",
              "run_id": "${{ github.run_id }}",
              "repository": "${{ github.repository }}"
            }

  # ============================================
  # Deployment Summary
  # ============================================

  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build-and-push, trigger-api-deploy, build-and-deploy-swa, trigger-swa-deploy]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (API) | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy (API) | ${{ needs.trigger-api-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (SWA) | ${{ needs.build-and-deploy-swa.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy (SWA) | ${{ needs.trigger-swa-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.trigger-api-deploy.result }}" == "success" ]; then
            echo "### API Deployment Triggered" >> $GITHUB_STEP_SUMMARY
            echo "- **Image:** \`${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **URL:** https://dev.story-generator.mystira.app" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.trigger-swa-deploy.result }}" == "success" ]; then
            echo "### SWA Deployment Triggered" >> $GITHUB_STEP_SUMMARY
            echo "- **URL:** https://dev.story.mystira.app" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.trigger-api-deploy.result }}" == "skipped" ] && [ "${{ needs.trigger-swa-deploy.result }}" == "skipped" ]; then
            echo "### No Deployment" >> $GITHUB_STEP_SUMMARY
            echo "Deployment only runs on push to \`dev\` branch." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_Staging/prod deployments are managed through the workspace._" >> $GITHUB_STEP_SUMMARY
