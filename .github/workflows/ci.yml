name: "[CI] Build & Test"

# Workspace-level CI: Runs linting, testing, and building across all packages
# This is the main CI pipeline that validates code quality and functionality
# Runs on: Pull requests and pushes to dev/main branches

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Provide empty token to prevent pnpm warnings about missing NODE_AUTH_TOKEN
  NODE_AUTH_TOKEN: ""

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN || 'dummy' }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Setup submodule ESLint configurations
        run: |
          # Copy workspace ESLint configs to submodules (overrides their configs with proper globals)
          cp configs/admin-ui.eslint.config.mjs packages/admin-ui/eslint.config.mjs
          cp configs/admin-ui.eslint.config.mjs packages/publisher/eslint.config.mjs

      - name: Install dependencies
        # Note: --frozen-lockfile is not used because all packages are git submodules
        # with their own dependencies that can't be tracked in the workspace lockfile
        run: pnpm install

      - name: Run linting
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN || 'dummy' }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        # Note: --frozen-lockfile is not used because all packages are git submodules
        run: pnpm install

      - name: Setup submodule Vitest configurations
        run: |
          # Copy workspace Vitest configs to submodules (adds passWithNoTests for packages without tests)
          cp configs/admin-ui.vite.config.ts packages/admin-ui/vite.config.ts

      - name: Run tests with coverage
        run: pnpm test -- --coverage

      - name: Upload TypeScript coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: typescript
          directory: ./
          files: "**/coverage/lcov.info,**/coverage/cobertura-coverage.xml"
          fail_ci_if_error: false
          verbose: true

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN || 'dummy' }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        # Note: --frozen-lockfile is not used because all packages are git submodules
        run: pnpm install

      - name: Build all packages
        run: pnpm build

  build-dotnet:
    name: Build and Test .NET
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
          source-url: https://nuget.pkg.github.com/phoenixvc/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Lint .NET (format check)
        id: lint-dotnet
        run: |
          echo "Checking .NET code formatting..."
          LINT_STATUS="success"
          dotnet format packages/domain/Mystira.Domain --verify-no-changes --verbosity diagnostic || LINT_STATUS="failure"
          dotnet format packages/application/Mystira.Application --verify-no-changes --verbosity diagnostic || LINT_STATUS="failure"
          echo "lint=$LINT_STATUS" >> $GITHUB_OUTPUT
          if [ "$LINT_STATUS" = "failure" ]; then
            echo "::warning::Format issues found. Run 'dotnet format' to fix."
          fi
        continue-on-error: true

      - name: Build Mystira.Core
        id: build-core
        run: |
          echo "Building Mystira.Core..."
          dotnet build packages/core/Mystira.Core --configuration Release
          echo "core=success" >> $GITHUB_OUTPUT

      - name: Test Mystira.Core with coverage
        id: test-core
        run: |
          echo "Testing Mystira.Core with coverage..."
          dotnet test packages/core/Mystira.Core.Tests --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/core \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
          echo "core_tests=success" >> $GITHUB_OUTPUT

      - name: Build Mystira.Contracts
        id: build-contracts
        run: |
          echo "Building Mystira.Contracts..."
          dotnet build packages/contracts/dotnet/Mystira.Contracts --configuration Release
          echo "contracts=success" >> $GITHUB_OUTPUT

      - name: Build Mystira.Shared
        id: build-shared
        run: |
          echo "Building Mystira.Shared..."
          dotnet build packages/shared/Mystira.Shared --configuration Release
          echo "shared=success" >> $GITHUB_OUTPUT

      - name: Test Mystira.Shared with coverage
        id: test-shared
        run: |
          echo "Testing Mystira.Shared with coverage..."
          dotnet test packages/shared/Mystira.Shared.Tests --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/shared \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
            2>/dev/null || echo "No tests or tests skipped"
          echo "tests=success" >> $GITHUB_OUTPUT

      - name: Build Mystira.Domain
        id: build-domain
        run: |
          echo "Building Mystira.Domain..."
          dotnet build packages/domain/Mystira.Domain --configuration Release
          echo "domain=success" >> $GITHUB_OUTPUT

      - name: Build Mystira.Application
        id: build-application
        run: |
          echo "Building Mystira.Application..."
          dotnet build packages/application/Mystira.Application --configuration Release
          echo "application=success" >> $GITHUB_OUTPUT

      - name: Build Mystira.Infrastructure packages
        id: build-infrastructure
        run: |
          echo "Building Mystira.Infrastructure packages..."
          PACKAGES=(
            "packages/infrastructure/Mystira.Infrastructure.Data"
            "packages/infrastructure/Mystira.Infrastructure.Azure"
            "packages/infrastructure/Mystira.Infrastructure.Discord"
            "packages/infrastructure/Mystira.Infrastructure.Teams"
            "packages/infrastructure/Mystira.Infrastructure.WhatsApp"
            "packages/infrastructure/Mystira.Infrastructure.Payments"
            "packages/infrastructure/Mystira.Infrastructure.StoryProtocol"
          )
          for PKG in "${PACKAGES[@]}"; do
            echo "Building $PKG..."
            dotnet build "$PKG" --configuration Release
          done
          echo "infrastructure=success" >> $GITHUB_OUTPUT

      - name: Test Mystira.Infrastructure.StoryProtocol with coverage
        id: test-storyprotocol
        run: |
          echo "Testing Mystira.Infrastructure.StoryProtocol with coverage..."
          dotnet test packages/infrastructure/Mystira.Infrastructure.StoryProtocol.Tests --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/storyprotocol \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
          echo "storyprotocol_tests=success" >> $GITHUB_OUTPUT

      - name: Upload .NET Core coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: dotnet-core
          directory: ./coverage/core
          files: "**/coverage.cobertura.xml"
          fail_ci_if_error: false
          verbose: true

      - name: Upload .NET Shared coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: dotnet-shared
          directory: ./coverage/shared
          files: "**/coverage.cobertura.xml"
          fail_ci_if_error: false
          verbose: true

      - name: Upload .NET StoryProtocol coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: dotnet-storyprotocol
          directory: ./coverage/storyprotocol
          files: "**/coverage.cobertura.xml"
          fail_ci_if_error: false
          verbose: true

      - name: Build Summary
        run: |
          echo "## .NET Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Build | Test |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Mystira.Core | ${{ steps.build-core.outputs.core == 'success' && '✅' || '❌' }} | ${{ steps.test-core.outputs.core_tests == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mystira.Contracts | ${{ steps.build-contracts.outputs.contracts == 'success' && '✅' || '❌' }} | N/A |" >> $GITHUB_STEP_SUMMARY
          echo "| Mystira.Shared | ${{ steps.build-shared.outputs.shared == 'success' && '✅' || '❌' }} | ${{ steps.test-shared.outputs.tests == 'success' && '✅' || '⏭️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mystira.Domain | ${{ steps.build-domain.outputs.domain == 'success' && '✅' || '❌' }} | N/A |" >> $GITHUB_STEP_SUMMARY
          echo "| Mystira.Application | ${{ steps.build-application.outputs.application == 'success' && '✅' || '❌' }} | N/A |" >> $GITHUB_STEP_SUMMARY
          echo "| Mystira.Infrastructure.* (7) | ${{ steps.build-infrastructure.outputs.infrastructure == 'success' && '✅' || '❌' }} | N/A |" >> $GITHUB_STEP_SUMMARY
          echo "| Mystira.Infrastructure.StoryProtocol.Tests | N/A | ${{ steps.test-storyprotocol.outputs.storyprotocol_tests == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### .NET Lint" >> $GITHUB_STEP_SUMMARY
          echo "| Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ steps.lint-dotnet.outputs.lint == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List types in Mystira.Core
          echo "### Mystira.Core Types" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Click to expand</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep -rh "^public \(class\|record\|interface\|enum\|struct\)" --include="*.cs" packages/core/Mystira.Core/ | \
            sed 's/^public //' | sed 's/{.*//' | sed 's/ :.*//' | sort | uniq >> $GITHUB_STEP_SUMMARY || echo "(none found)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List types in Mystira.Contracts
          echo "### Mystira.Contracts Types" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Click to expand</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep -rh "^public \(class\|record\|interface\|enum\|struct\)" --include="*.cs" packages/contracts/dotnet/Mystira.Contracts/ | \
            sed 's/^public //' | sed 's/{.*//' | sed 's/ :.*//' | sort | uniq >> $GITHUB_STEP_SUMMARY || echo "(none found)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

  # Integration tests - runs service tests with real dependencies
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-dotnet]
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    permissions:
      contents: read
      packages: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mystira_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
          source-url: https://nuget.pkg.github.com/phoenixvc/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      # Configure NuGet credentials for GitHub Packages
      # Remove submodule nuget.config files and create a single workspace config with credentials
      - name: Configure NuGet for GitHub Packages
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          echo "=== Removing any nuget.config files in submodules ==="
          # Remove submodule configs that might override our authenticated config
          find packages -name "nuget.config" -o -name "NuGet.config" -o -name "NuGet.Config" 2>/dev/null | while read f; do
            echo "Removing: $f"
            rm -f "$f"
          done

          echo ""
          echo "=== Creating authenticated nuget.config at workspace root ==="
          cat > nuget.config << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
              <add key="github" value="https://nuget.pkg.github.com/phoenixvc/index.json" />
            </packageSources>
            <packageSourceCredentials>
              <github>
                <add key="Username" value="phoenixvc" />
                <add key="ClearTextPassword" value="${GH_PACKAGES_TOKEN}" />
              </github>
            </packageSourceCredentials>
          </configuration>
          EOF

          echo ""
          echo "=== Verifying NuGet configuration ==="
          echo "Workspace nuget.config created with GitHub Packages credentials"
          cat nuget.config | grep -v ClearTextPassword

          echo ""
          echo "=== NuGet sources (should show github with auth) ==="
          dotnet nuget list source

      - name: Wait for services
        run: |
          # Install redis-tools for redis-cli
          sudo apt-get update && sudo apt-get install -y redis-tools

          echo "Waiting for PostgreSQL..."
          timeout 30 bash -c 'until pg_isready -h localhost -p 5432; do sleep 1; done'
          PG_STATUS=$?

          echo "Waiting for Redis..."
          timeout 30 bash -c 'until redis-cli -h localhost ping 2>/dev/null; do sleep 1; done'
          REDIS_STATUS=$?

          # Export status for use in summary
          echo "PG_READY=$([[ $PG_STATUS -eq 0 ]] && echo 'true' || echo 'false')" >> $GITHUB_ENV
          echo "REDIS_READY=$([[ $REDIS_STATUS -eq 0 ]] && echo 'true' || echo 'false')" >> $GITHUB_ENV

          # Fail if services didn't start
          if [[ $PG_STATUS -ne 0 ]] || [[ $REDIS_STATUS -ne 0 ]]; then
            echo "::error::Service dependencies failed to start"
            exit 1
          fi

      - name: Run integration tests
        env:
          ConnectionStrings__PostgreSQL: "Host=localhost;Database=mystira_test;Username=test;Password=test"
          ConnectionStrings__Redis: "localhost:6379"
          ASPNETCORE_ENVIRONMENT: Testing
          # Required for NuGet package restore from GitHub Packages (especially for submodule packages)
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          # Find and run all integration tests
          echo "Running integration tests..."
          ALL_PROJECTS=$(find packages -name "*.Tests.csproj" -type f)
          PROJECT_COUNT=$(echo "$ALL_PROJECTS" | wc -l)
          MAX_PROJECTS=20

          if [ "$PROJECT_COUNT" -gt "$MAX_PROJECTS" ]; then
            echo "::warning::Found $PROJECT_COUNT test projects, but limiting to $MAX_PROJECTS. Consider running in batches or increasing limit."
            INTEGRATION_PROJECTS=$(echo "$ALL_PROJECTS" | head -$MAX_PROJECTS)
          else
            INTEGRATION_PROJECTS="$ALL_PROJECTS"
          fi
          TEST_FAILED=0

          for PROJECT in $INTEGRATION_PROJECTS; do
            echo "Testing: $PROJECT"
            # Build is required since artifacts aren't shared between jobs
            if ! dotnet test "$PROJECT" --configuration Release \
              --filter "Category=Integration|FullyQualifiedName~Integration" \
              --logger "trx" 2>/dev/null; then
              TEST_FAILED=1
              echo "::warning::Integration tests failed for $PROJECT"
            fi
          done

          if [[ $TEST_FAILED -ne 0 ]]; then
            echo "::error::One or more integration test projects failed"
            exit 1
          fi

      - name: Integration Test Summary
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          PG_EMOJI=$([[ "${{ env.PG_READY }}" == "true" ]] && echo "✅" || echo "❌")
          REDIS_EMOJI=$([[ "${{ env.REDIS_READY }}" == "true" ]] && echo "✅" || echo "❌")
          echo "| PostgreSQL 16 | $PG_EMOJI |" >> $GITHUB_STEP_SUMMARY
          echo "| Redis 7 | $REDIS_EMOJI |" >> $GITHUB_STEP_SUMMARY

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, test, build, build-dotnet, integration-tests]
    # Always run summary job to report status regardless of previous job outcomes
    if: always()
    permissions:
      contents: read
    steps:
      - name: Generate Summary
        run: |
          echo "# CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint (TypeScript) | ${{ needs.lint.result == 'success' && '✅' || needs.lint.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test (TypeScript) | ${{ needs.test.result == 'success' && '✅' || needs.test.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (TypeScript) | ${{ needs.build.result == 'success' && '✅' || needs.build.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (.NET) | ${{ needs['build-dotnet'].result == 'success' && '✅' || needs['build-dotnet'].result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs['integration-tests'].result == 'success' && '✅' || needs['integration-tests'].result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status (integration-tests failure is a warning, not blocking)
          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.test.result }}" == "success" ] && \
             [ "${{ needs.build.result }}" == "success" ] && \
             [ "${{ needs['build-dotnet'].result }}" == "success" ]; then
            echo "## ✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Some checks failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please check the job logs above for details." >> $GITHUB_STEP_SUMMARY
          fi
