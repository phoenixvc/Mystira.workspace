name: CI

on:
  push:
    branches: [dev, main]
    paths:
      - "Mystira.DevHub/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Rust Workspace (Contracts + Leptos)
  # ============================================================================

  lint-rust:
    name: Lint Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}

  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests (contracts)
        run: cargo test -p mystira-contracts --all-features

      - name: Run tests (tauri backend)
        run: cargo test -p mystira-leptos-tauri --all-features
        continue-on-error: true

  build-leptos-wasm:
    name: Build Leptos (WASM)
    runs-on: ubuntu-latest
    needs: [lint-rust, test-rust]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js (for Tailwind)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Tailwind
        working-directory: Mystira.Leptos
        run: npm install

      - name: Build CSS
        working-directory: Mystira.Leptos
        run: npm run css

      - name: Build Leptos WASM
        working-directory: Mystira.Leptos
        run: trunk build --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: leptos-wasm-dist
          path: Mystira.Leptos/dist
          retention-days: 7

  # ============================================================================
  # React DevHub (Existing)
  # ============================================================================

  lint-react:
    name: Lint React
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Mystira.DevHub
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: Mystira.DevHub/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}

      - name: Lint
        run: pnpm lint
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}

  test-react:
    name: Test React
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Mystira.DevHub
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: Mystira.DevHub/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test -- --run
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}

  build-react:
    name: Build React
    runs-on: ubuntu-latest
    needs: [lint-react, test-react]
    defaults:
      run:
        working-directory: Mystira.DevHub
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: Mystira.DevHub/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: react-devhub-dist
          path: Mystira.DevHub/dist
          retention-days: 7

  # ============================================================================
  # .NET Components
  # ============================================================================

  build-dotnet:
    name: Build .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: |
          dotnet restore Mystira.DevHub.CLI/Mystira.DevHub.CLI.csproj
          dotnet restore Mystira.DevHub.Services/Mystira.DevHub.Services.csproj

      - name: Build
        run: |
          dotnet build Mystira.DevHub.CLI/Mystira.DevHub.CLI.csproj --configuration Release --no-restore
          dotnet build Mystira.DevHub.Services/Mystira.DevHub.Services.csproj --configuration Release --no-restore

      - name: Publish CLI
        run: dotnet publish Mystira.DevHub.CLI/Mystira.DevHub.CLI.csproj --configuration Release --no-build --output ./publish/cli

      - uses: actions/upload-artifact@v4
        with:
          name: devhub-cli
          path: ./publish/cli
          retention-days: 7
