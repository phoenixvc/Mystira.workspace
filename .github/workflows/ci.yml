name: "[CI] Story Generator"

on:
  push:
    branches: [dev, main]
    paths:
      - "src/**/*.cs"
      - "src/**/*.csproj"
      - "**/*.sln"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes --verbosity diagnostic
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build API
        run: dotnet build --no-restore --configuration Release
        working-directory: src/Mystira.StoryGenerator.Api

      - name: Build Web
        run: dotnet build --no-restore --configuration Release
        working-directory: src/Mystira.StoryGenerator.Web

      - name: Publish API
        run: dotnet publish --no-build --configuration Release --output ./publish
        working-directory: src/Mystira.StoryGenerator.Api

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: story-generator-api-build
          path: src/Mystira.StoryGenerator.Api/publish
          retention-days: 7

