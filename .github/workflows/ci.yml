name: "Admin API: CI"

on:
  push:
    branches: [dev, main]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.sln"
      - "nuget.config"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
          source-url: https://nuget.pkg.github.com/phoenixvc/index.json
        env:
          # GH_PACKAGES_TOKEN: PAT with read:packages scope for cross-repo access
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      - run: dotnet restore
      - run: dotnet format --verify-no-changes --verbosity diagnostic
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}

  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
          source-url: https://nuget.pkg.github.com/phoenixvc/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      - run: dotnet restore
      - name: Run tests with coverage
        run: |
          dotnet test --no-restore --verbosity normal \
            --settings tests/Mystira.Admin.Api.Tests/coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover,cobertura
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          files: "**/*.cobertura.xml,**/*.opencover.xml"
          flags: unittests
          name: mystira-admin-api
          fail_ci_if_error: false
          verbose: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
          source-url: https://nuget.pkg.github.com/phoenixvc/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet publish --configuration Release --no-build --output ./publish
      - uses: actions/upload-artifact@v6
        with:
          name: admin-api-build
          path: ./publish
          retention-days: 7
