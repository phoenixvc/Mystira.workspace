name: "[Publish] GitHub Packages (Changesets)"

# Unified Package Releases: Manages versioning and publishing via Changesets
# Handles: Creating release PRs and publishing NPM packages to GitHub Packages
# Note: NuGet packages are no longer published - use ProjectReference in monorepo
# Note: For infrastructure deployments, see Deployment workflows
# Runs on: Pushes to main branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

# This workflow handles NPM package releases via Changesets
# - NPM packages: Published to GitHub Packages via changesets action
# - NuGet packages: No longer published - all .NET packages use ProjectReference
# For infrastructure deployments, see staging-release.yml and production-release.yml

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@mystira"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
