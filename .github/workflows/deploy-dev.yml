name: "Admin API: Deploy Dev"

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
    types: [closed]
  workflow_dispatch:

concurrency:
  group: deploy-dev-${{ github.workflow }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  AZURE_CONTAINER_REGISTRY: mysdevacr
  IMAGE_NAME: mys-admin-api
  AKS_CLUSTER: mys-dev-mystira-aks-eus
  AKS_RESOURCE_GROUP: mys-dev-mystira-rg-eus
  NAMESPACE: mys-dev

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    # Only run on push to dev OR when a PR to dev is merged
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=dev-
            type=raw,value=dev

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/Mystira.App.Admin.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NUGET_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}

  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Create namespace if not exists
        run: kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to AKS
        run: |
          kubectl apply -k ./infra/kubernetes/overlays/dev

      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/mys-admin-api \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=300s

      - name: Verify deployment
        run: |
          echo "Deployment Status:"
          kubectl get deployment mys-admin-api -n ${{ env.NAMESPACE }} -o wide
          echo ""
          echo "Pod Status:"
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=mys-admin-api
          echo ""
          echo "Service Status:"
          kubectl get svc mys-admin-api -n ${{ env.NAMESPACE }}

  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Admin API Dev Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Status | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Status | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Endpoint" >> $GITHUB_STEP_SUMMARY
          echo "- Dev API: https://dev.admin-api.mystira.app" >> $GITHUB_STEP_SUMMARY
