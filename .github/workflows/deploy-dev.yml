name: "Admin API: Build & Deploy Dev"

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
    types: [closed]
  workflow_dispatch:

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  AZURE_CONTAINER_REGISTRY: mysdevacr
  IMAGE_NAME: mys-admin-api

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    # Only run on push to dev OR when a PR to dev is merged
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=dev-
            type=raw,value=dev

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/Mystira.App.Admin.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NUGET_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}

  trigger-workspace-deploy:
    name: Trigger Workspace Deployment
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Trigger deployment via workspace
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WORKSPACE_DISPATCH_TOKEN }}
          repository: phoenixvc/Mystira.workspace
          event-type: admin-api-deploy
          client-payload: |
            {
              "environment": "dev",
              "ref": "${{ github.sha }}",
              "triggered_by": "${{ github.actor }}",
              "run_id": "${{ github.run_id }}",
              "image_tag": "dev-${{ github.sha }}",
              "pr_number": "${{ github.event.pull_request.number || '' }}"
            }

  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-push, trigger-workspace-deploy]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Admin API Dev Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Status | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dispatch Status | ${{ needs.trigger-workspace-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- Image pushed to ACR with tag: dev-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment triggered via Mystira.workspace" >> $GITHUB_STEP_SUMMARY
          echo "- Staging/prod deployments are managed through the workspace only" >> $GITHUB_STEP_SUMMARY
