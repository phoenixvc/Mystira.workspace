name: "[CI] Infrastructure - Terragrunt Validate"

# Terragrunt Validation: Validates product-based Terraform structure
# Checks: Terragrunt format, validate, and plan for all products
# Triggers: PRs with infrastructure changes

on:
  pull_request:
    branches: [main, staging, dev]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra-terragrunt-*.yml"
      - "!**/*.md"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to validate"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: infra-terragrunt-validate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.10.3"
  TERRAGRUNT_VERSION: "0.69.1"
  # Feature toggles - set to 'false' to disable specific checks
  ENABLE_TFLINT: "true"
  ENABLE_TRIVY: "true"
  ENABLE_CHECKOV: "true"
  # Security scan settings - set CHECKOV_SOFT_FAIL to 'false' to enforce strict security
  CHECKOV_SOFT_FAIL: "true"

jobs:
  # ============================================
  # Detect Changed Products
  # ============================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shared-infra: ${{ steps.changes.outputs.shared-infra }}
      mystira-app: ${{ steps.changes.outputs.mystira-app }}
      story-generator: ${{ steps.changes.outputs.story-generator }}
      admin: ${{ steps.changes.outputs.admin }}
      publisher: ${{ steps.changes.outputs.publisher }}
      chain: ${{ steps.changes.outputs.chain }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            shared-infra:
              - 'infra/terraform/shared-infra/**'
              - 'infra/terraform/modules/shared/**'
              - 'infra/terraform/terragrunt.hcl'
            mystira-app:
              - 'infra/terraform/products/mystira-app/**'
              - 'infra/terraform/modules/mystira-app/**'
            story-generator:
              - 'infra/terraform/products/story-generator/**'
              - 'infra/terraform/modules/story-generator/**'
            admin:
              - 'infra/terraform/products/admin/**'
              - 'infra/terraform/modules/admin-api/**'
              - 'infra/terraform/modules/admin-ui/**'
            publisher:
              - 'infra/terraform/products/publisher/**'
              - 'infra/terraform/modules/publisher/**'
            chain:
              - 'infra/terraform/products/chain/**'
              - 'infra/terraform/modules/chain/**'

  # ============================================
  # Format Check
  # ============================================
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          TG_VERSION="${{ env.TERRAGRUNT_VERSION }}"
          TG_URL="https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}"

          wget -q -O terragrunt "${TG_URL}/terragrunt_linux_amd64"
          wget -q -O terragrunt_SHA256SUMS "${TG_URL}/SHA256SUMS"

          # Verify checksum
          EXPECTED=$(grep "terragrunt_linux_amd64" terragrunt_SHA256SUMS | awk '{print $1}')
          ACTUAL=$(sha256sum terragrunt | awk '{print $1}')
          if [[ "$EXPECTED" != "$ACTUAL" ]]; then
            echo "::error::Terragrunt checksum verification failed"
            exit 1
          fi

          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          rm -f terragrunt_SHA256SUMS

      - name: Terraform Format Check
        run: |
          cd infra/terraform
          terraform fmt -check -recursive || {
            echo "::error::Terraform files are not properly formatted. Run 'terraform fmt -recursive' to fix."
            exit 1
          }

      - name: Terragrunt HCL Format Check
        run: |
          cd infra/terraform
          terragrunt hclfmt --terragrunt-check || {
            echo "::error::Terragrunt files are not properly formatted. Run 'terragrunt hclfmt' to fix."
            exit 1
          }

  # ============================================
  # TFLint - Terraform Linter
  # ============================================
  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Note: ENABLE_TFLINT toggle is defined in env but not used at job-level
    # (env context unavailable in job-level if conditions)
    # To disable, set ENABLE_TFLINT=false in repository variables (vars context)
    if: ${{ vars.ENABLE_TFLINT != 'false' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint on modules
        run: |
          cd infra/terraform
          echo "## TFLint Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Lint all module directories
          for dir in modules/*/; do
            if [[ -d "$dir" ]]; then
              echo "Linting $dir..."
              tflint --chdir="$dir" --format=compact || true
            fi
          done

          # Lint shared modules
          for dir in modules/shared/*/; do
            if [[ -d "$dir" ]]; then
              echo "Linting $dir..."
              tflint --chdir="$dir" --format=compact || true
            fi
          done

  # ============================================
  # Trivy - IaC Security Scanner
  # ============================================
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ vars.ENABLE_TRIVY != 'false' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy IaC Scanner
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518  # 0.34.1 - pinned SHA for security
        with:
          scan-type: 'config'
          scan-ref: 'infra/terraform'
          format: 'sarif'
          output: 'trivy-iac-results.sarif'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-iac-results.sarif') != ''
        with:
          sarif_file: trivy-iac-results.sarif

      - name: Trivy Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Trivy IaC Security Scan

          Security scan completed. Check the Security tab for detailed findings.
          EOF

  # ============================================
  # Validate Shared Infrastructure
  # ============================================
  validate-shared-infra:
    name: Validate shared-infra
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes, format-check]
    if: needs['detect-changes'].outputs['shared-infra'] == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          TG_VERSION="${{ env.TERRAGRUNT_VERSION }}"
          TG_URL="https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}"

          wget -q -O terragrunt "${TG_URL}/terragrunt_linux_amd64"
          wget -q -O terragrunt_SHA256SUMS "${TG_URL}/SHA256SUMS"

          # Verify checksum
          EXPECTED=$(grep "terragrunt_linux_amd64" terragrunt_SHA256SUMS | awk '{print $1}')
          ACTUAL=$(sha256sum terragrunt | awk '{print $1}')
          if [[ "$EXPECTED" != "$ACTUAL" ]]; then
            echo "::error::Terragrunt checksum verification failed"
            exit 1
          fi

          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          rm -f terragrunt_SHA256SUMS

      - name: Terragrunt Init
        run: |
          cd infra/terraform/shared-infra/environments/${{ matrix.environment }}
          terragrunt init --terragrunt-non-interactive -backend=false
        env:
          TF_VAR_environment: ${{ matrix.environment }}

      - name: Terragrunt Validate
        run: |
          cd infra/terraform/shared-infra/environments/${{ matrix.environment }}
          terragrunt validate --terragrunt-non-interactive
        env:
          TF_VAR_environment: ${{ matrix.environment }}

  # ============================================
  # Validate Products
  # ============================================
  validate-products:
    name: Validate ${{ matrix.product }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes, format-check, validate-shared-infra]
    if: always() && needs.format-check.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        product: [mystira-app, story-generator, admin, publisher, chain]
        environment: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Check if product changed
        id: check
        run: |
          PRODUCT="${{ matrix.product }}"
          CHANGED="${{ needs['detect-changes'].outputs[matrix.product] }}"
          if [[ "$CHANGED" == "true" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        if: steps.check.outputs.run == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        if: steps.check.outputs.run == 'true'
        run: |
          TG_VERSION="${{ env.TERRAGRUNT_VERSION }}"
          TG_URL="https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}"

          wget -q -O terragrunt "${TG_URL}/terragrunt_linux_amd64"
          wget -q -O terragrunt_SHA256SUMS "${TG_URL}/SHA256SUMS"

          # Verify checksum
          EXPECTED=$(grep "terragrunt_linux_amd64" terragrunt_SHA256SUMS | awk '{print $1}')
          ACTUAL=$(sha256sum terragrunt | awk '{print $1}')
          if [[ "$EXPECTED" != "$ACTUAL" ]]; then
            echo "::error::Terragrunt checksum verification failed"
            exit 1
          fi

          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          rm -f terragrunt_SHA256SUMS

      - name: Terragrunt Init
        if: steps.check.outputs.run == 'true'
        run: |
          cd infra/terraform/products/${{ matrix.product }}/environments/${{ matrix.environment }}
          terragrunt init --terragrunt-non-interactive -backend=false
        env:
          TF_VAR_environment: ${{ matrix.environment }}

      - name: Terragrunt Validate
        if: steps.check.outputs.run == 'true'
        run: |
          cd infra/terraform/products/${{ matrix.product }}/environments/${{ matrix.environment }}
          terragrunt validate --terragrunt-non-interactive
        env:
          TF_VAR_environment: ${{ matrix.environment }}

  # ============================================
  # Security Scan (Checkov)
  # ============================================
  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: format-check
    if: ${{ vars.ENABLE_CHECKOV != 'false' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          framework: terraform
          soft_fail: ${{ env.CHECKOV_SOFT_FAIL != 'false' }}
          output_format: github_failed_only

  # ============================================
  # Summary
  # ============================================
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [format-check, tflint, trivy, validate-shared-infra, validate-products, security-scan]
    if: always()
    steps:
      - name: Check Results
        run: |
          echo "# Terragrunt Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ needs.format-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TFLint | ${{ needs.tflint.result == 'success' && '✅ Passed' || '⚠️ Check warnings' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy.result == 'success' && '✅ Passed' || '⚠️ Check warnings' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shared Infra | ${{ needs.validate-shared-infra.result == 'success' && '✅ Passed' || (needs.validate-shared-infra.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Products | ${{ needs.validate-products.result == 'success' && '✅ Passed' || (needs.validate-products.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkov | ${{ needs.security-scan.result == 'success' && '✅ Passed' || '⚠️ Check warnings' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if Critical Checks Failed
        if: needs.format-check.result == 'failure' || needs.validate-shared-infra.result == 'failure' || needs.validate-products.result == 'failure'
        run: |
          echo "Critical validation checks failed!"
          exit 1
