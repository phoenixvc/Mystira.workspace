name: "[Scheduled] Secret Rotation Check"

# Secret Rotation Check: Monitors secret health and notifies when rotation is needed
# This workflow:
#   - Checks Azure AD app credential expiration
#   - Validates GitHub token permissions
#   - Monitors secret last-used dates
#   - Creates issues when rotation is needed
#
# Note: With OIDC authentication, Azure credentials don't need rotation
# This workflow monitors remaining secrets that still require periodic rotation

on:
  schedule:
    # Run weekly on Monday at 9 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      notify_slack:
        description: "Send Slack notification"
        required: false
        type: boolean
        default: true

env:
  # Secrets that require periodic rotation (not OIDC-based)
  # - GitHub PATs: 90-day recommended rotation
  # - Webhook URLs: Rotate if compromised
  # - API keys: Per provider policy
  ROTATION_WARNING_DAYS: 14

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  check-azure-credentials:
    name: Check Azure AD Credentials
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      expiring_soon: ${{ steps.check.outputs.expiring_soon }}
      credentials_status: ${{ steps.check.outputs.status }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        continue-on-error: true

      - name: Check Azure AD App Credentials
        id: check
        run: |
          echo "## Azure Credential Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if OIDC login succeeded
          if ! az account show &>/dev/null; then
            echo "::warning::Azure OIDC login failed - check federated credential configuration"
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "expiring_soon=unknown" >> $GITHUB_OUTPUT
            echo "| Status | OIDC login failed |" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # Get current date for comparison
          CURRENT_DATE=$(date +%Y-%m-%d)
          WARNING_DATE=$(date -d "+${{ env.ROTATION_WARNING_DAYS }} days" +%Y-%m-%d)

          # Check app registration credentials (if any exist beyond OIDC)
          APP_ID="${{ secrets.AZURE_CLIENT_ID }}"
          if [ -n "$APP_ID" ]; then
            # List credential expiration dates
            CREDS=$(az ad app credential list --id "$APP_ID" --query "[].{endDateTime:endDateTime, displayName:displayName}" -o json 2>/dev/null || echo "[]")

            if [ "$CREDS" != "[]" ]; then
              EXPIRING_COUNT=0

              # Use process substitution to avoid subshell variable scope issue
              while read -r cred; do
                END_DATE=$(echo "$cred" | jq -r '.endDateTime' | cut -d'T' -f1)
                NAME=$(echo "$cred" | jq -r '.displayName // "unnamed"')

                if [[ "$END_DATE" < "$WARNING_DATE" ]]; then
                  EXPIRING_COUNT=$((EXPIRING_COUNT + 1))
                  echo "| Credential: $NAME | Expires: $END_DATE |" >> $GITHUB_STEP_SUMMARY
                fi
              done < <(echo "$CREDS" | jq -c '.[]')

              if [ $EXPIRING_COUNT -gt 0 ]; then
                echo "expiring_soon=true" >> $GITHUB_OUTPUT
                echo "::warning::$EXPIRING_COUNT credential(s) expiring within ${{ env.ROTATION_WARNING_DAYS }} days"
              else
                echo "expiring_soon=false" >> $GITHUB_OUTPUT
                echo "| Password Credentials | No expiration warnings |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| Password Credentials | None (using OIDC) |" >> $GITHUB_STEP_SUMMARY
              echo "expiring_soon=false" >> $GITHUB_OUTPUT
            fi

            # Check federated credentials
            FED_CREDS=$(az ad app federated-credential list --id "$APP_ID" --query "length(@)" -o tsv 2>/dev/null || echo "0")
            echo "| Federated Credentials (OIDC) | $FED_CREDS configured |" >> $GITHUB_STEP_SUMMARY

            echo "status=healthy" >> $GITHUB_OUTPUT
          else
            echo "| Azure Client ID | Not configured |" >> $GITHUB_STEP_SUMMARY
            echo "status=not_configured" >> $GITHUB_OUTPUT
            echo "expiring_soon=false" >> $GITHUB_OUTPUT
          fi

  check-github-tokens:
    name: Check GitHub Token Health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      token_status: ${{ steps.check.outputs.status }}
    steps:
      - name: Check GitHub Token Permissions
        id: check
        env:
          SUBMODULE_TOKEN: ${{ secrets.MYSTIRA_GITHUB_SUBMODULE_ACCESS_TOKEN }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          echo "## GitHub Token Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Token | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          ISSUES=0

          # Check submodule token
          if [ -n "$SUBMODULE_TOKEN" ]; then
            # Test token by checking rate limit (works with any valid token)
            RESPONSE=$(curl -s -H "Authorization: token $SUBMODULE_TOKEN" \
              "https://api.github.com/rate_limit" 2>/dev/null)

            if echo "$RESPONSE" | grep -q '"rate"'; then
              REMAINING=$(echo "$RESPONSE" | jq -r '.rate.remaining')
              echo "| MYSTIRA_GITHUB_SUBMODULE_ACCESS_TOKEN | Valid (rate limit: $REMAINING) |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| MYSTIRA_GITHUB_SUBMODULE_ACCESS_TOKEN | Invalid or expired |" >> $GITHUB_STEP_SUMMARY
              ISSUES=$((ISSUES + 1))
            fi
          else
            echo "| MYSTIRA_GITHUB_SUBMODULE_ACCESS_TOKEN | Not configured |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check packages token
          if [ -n "$GH_PACKAGES_TOKEN" ]; then
            RESPONSE=$(curl -s -H "Authorization: token $GH_PACKAGES_TOKEN" \
              "https://api.github.com/rate_limit" 2>/dev/null)

            if echo "$RESPONSE" | grep -q '"rate"'; then
              echo "| GH_PACKAGES_TOKEN | Valid |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| GH_PACKAGES_TOKEN | Invalid or expired |" >> $GITHUB_STEP_SUMMARY
              ISSUES=$((ISSUES + 1))
            fi
          else
            echo "| GH_PACKAGES_TOKEN | Not configured |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ $ISSUES -gt 0 ]; then
            echo "status=issues_found" >> $GITHUB_OUTPUT
            echo "::warning::$ISSUES GitHub token(s) have issues"
          else
            echo "status=healthy" >> $GITHUB_OUTPUT
          fi

  check-webhook-urls:
    name: Check Webhook URLs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      webhook_status: ${{ steps.check.outputs.status }}
    steps:
      - name: Check Webhook Configuration
        id: check
        env:
          SLACK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          MS_TEAMS_URL: ${{ secrets.MS_TEAMS_WEBHOOK_URL }}
        run: |
          echo "## Webhook Configuration Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Webhook | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY

          # Check if webhooks are configured (don't test them to avoid spam)
          if [ -n "$SLACK_URL" ]; then
            echo "| SLACK_WEBHOOK_URL | Configured |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SLACK_WEBHOOK_URL | Not configured |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$TEAMS_URL" ]; then
            echo "| TEAMS_WEBHOOK_URL | Configured |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| TEAMS_WEBHOOK_URL | Not configured |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$MS_TEAMS_URL" ]; then
            echo "| MS_TEAMS_WEBHOOK_URL | Configured |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| MS_TEAMS_WEBHOOK_URL | Not configured |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "status=checked" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Note: Webhook URLs should be rotated if compromised or periodically per security policy._" >> $GITHUB_STEP_SUMMARY

  check-api-keys:
    name: Check API Keys
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      api_key_status: ${{ steps.check.outputs.status }}
    steps:
      - name: Check API Key Configuration
        id: check
        env:
          INFRACOST_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          echo "## API Key Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| API Key | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY

          ISSUES=0

          # Check Infracost API key
          if [ -n "$INFRACOST_KEY" ]; then
            # Test Infracost API key
            RESPONSE=$(curl -s -H "X-Api-Key: $INFRACOST_KEY" \
              "https://pricing.api.infracost.io/health" 2>/dev/null || echo "error")

            if echo "$RESPONSE" | grep -qi "ok\|healthy"; then
              echo "| INFRACOST_API_KEY | Valid |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| INFRACOST_API_KEY | Possibly invalid |" >> $GITHUB_STEP_SUMMARY
              ISSUES=$((ISSUES + 1))
            fi
          else
            echo "| INFRACOST_API_KEY | Not configured (cost estimation disabled) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ $ISSUES -gt 0 ]; then
            echo "status=issues_found" >> $GITHUB_OUTPUT
          else
            echo "status=healthy" >> $GITHUB_OUTPUT
          fi

  create-rotation-report:
    name: Create Rotation Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [check-azure-credentials, check-github-tokens, check-webhook-urls, check-api-keys]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Generate Report
        id: report
        run: |
          echo "# Secret Rotation Status Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Azure Credentials | ${{ needs.check-azure-credentials.outputs.credentials_status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Tokens | ${{ needs.check-github-tokens.outputs.token_status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Webhook URLs | ${{ needs.check-webhook-urls.outputs.webhook_status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Keys | ${{ needs.check-api-keys.outputs.api_key_status }} |" >> $GITHUB_STEP_SUMMARY

          # Determine if action needed
          NEEDS_ACTION="false"
          if [[ "${{ needs.check-azure-credentials.outputs.expiring_soon }}" == "true" ]] || \
             [[ "${{ needs.check-github-tokens.outputs.token_status }}" == "issues_found" ]] || \
             [[ "${{ needs.check-api-keys.outputs.api_key_status }}" == "issues_found" ]]; then
            NEEDS_ACTION="true"
          fi

          echo "needs_action=$NEEDS_ACTION" >> $GITHUB_OUTPUT

          if [ "$NEEDS_ACTION" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Action Required" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "One or more secrets require attention. See individual check results above." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Rotation Schedule Recommendations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Type | Recommended Rotation |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|---------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Azure OIDC Federated Credentials | No rotation needed |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub PATs | Every 90 days |" >> $GITHUB_STEP_SUMMARY
          echo "| Webhook URLs | When compromised |" >> $GITHUB_STEP_SUMMARY
          echo "| API Keys | Per provider policy |" >> $GITHUB_STEP_SUMMARY

      - name: Create Issue if Action Needed
        if: steps.report.outputs.needs_action == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Security] Secret Rotation Required - ${new Date().toISOString().split('T')[0]}`;

            // Check for existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'secret-rotation'
            });

            const body = `## Secret Rotation Required

            The weekly secret rotation check has identified secrets that need attention.

            ### Status
            - Azure Credentials: ${{ needs.check-azure-credentials.outputs.credentials_status }}
            - GitHub Tokens: ${{ needs.check-github-tokens.outputs.token_status }}
            - API Keys: ${{ needs.check-api-keys.outputs.api_key_status }}

            ### Action Items
            1. Review the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details
            2. Rotate any expired or expiring secrets
            3. Update GitHub repository secrets
            4. Close this issue when resolved

            ### Documentation
            - [OIDC Migration Guide](docs/OIDC_MIGRATION.md)
            - [Secret Rotation Runbook](docs/SECRET_ROTATION.md)

            ---
            *This issue was automatically created by the secret rotation check workflow.*`;

            if (issues.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `### Update - ${new Date().toISOString().split('T')[0]}\n\nSecret rotation check run completed. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
              });
              console.log(`Updated existing issue #${issues[0].number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['secret-rotation', 'security', 'automated']
              });
              console.log('Created new secret rotation issue');
            }

      - name: Notify Slack
        if: steps.report.outputs.needs_action == 'true' && (github.event.inputs.notify_slack == 'true' || github.event_name == 'schedule')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "text": "Secret Rotation Alert",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "Secret Rotation Required"
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "The weekly secret rotation check has identified secrets that need attention.\n\n*Status:*\n- Azure: ${{ needs.check-azure-credentials.outputs.credentials_status }}\n- GitHub Tokens: ${{ needs.check-github-tokens.outputs.token_status }}\n- API Keys: ${{ needs.check-api-keys.outputs.api_key_status }}"
                    }
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "View Details"
                        },
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }
                    ]
                  }
                ]
              }' "$SLACK_WEBHOOK_URL"
          fi

      - name: Notify Teams
        if: steps.report.outputs.needs_action == 'true' && (github.event.inputs.notify_slack == 'true' || github.event_name == 'schedule')
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          MS_TEAMS_WEBHOOK_URL: ${{ secrets.MS_TEAMS_WEBHOOK_URL }}
        run: |
          # Use TEAMS_WEBHOOK_URL or fall back to MS_TEAMS_WEBHOOK_URL
          WEBHOOK_URL="${TEAMS_WEBHOOK_URL:-$MS_TEAMS_WEBHOOK_URL}"

          if [ -n "$WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "@type": "MessageCard",
                "@context": "http://schema.org/extensions",
                "themeColor": "FF9800",
                "summary": "Secret Rotation Required",
                "sections": [{
                  "activityTitle": "Secret Rotation Alert",
                  "facts": [
                    {"name": "Azure Credentials", "value": "${{ needs.check-azure-credentials.outputs.credentials_status }}"},
                    {"name": "GitHub Tokens", "value": "${{ needs.check-github-tokens.outputs.token_status }}"},
                    {"name": "API Keys", "value": "${{ needs.check-api-keys.outputs.api_key_status }}"}
                  ],
                  "markdown": true
                }],
                "potentialAction": [{
                  "@type": "OpenUri",
                  "name": "View Details",
                  "targets": [{"os": "default", "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]
                }]
              }' "$WEBHOOK_URL"
          fi
