name: "[CI] Mystira.Ai"

on:
  push:
    paths:
      - 'packages/ai/**'
      - 'packages/contracts/**'
      - 'packages/domain/**'
      - '.github/workflows/packages-ai.yml'
    branches:
      - main
      - 'release/**'
  pull_request:
    paths:
      - 'packages/ai/**'
      - 'packages/contracts/**'
      - 'packages/domain/**'
      - '.github/workflows/packages-ai.yml'

concurrency:
  group: packages-ai-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
          source-url: https://nuget.pkg.github.com/phoenixvc/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build Mystira.Ai
        run: dotnet build packages/ai/Mystira.Ai --configuration Release

      - name: Test Mystira.Ai
        run: dotnet test packages/ai/Mystira.Ai.Tests --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: success()
        with:
          files: ./coverage/**/coverage.cobertura.xml
          flags: ai
          name: mystira-ai
          fail_ci_if_error: false

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
          source-url: https://nuget.pkg.github.com/phoenixvc/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Restore packages
        run: dotnet restore packages/ai/Mystira.Ai

      - name: Check for vulnerable packages
        run: |
          echo "## Vulnerability Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          RESULT=$(dotnet list packages/ai/Mystira.Ai package --vulnerable --include-transitive 2>&1) || true

          if echo "$RESULT" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected in Mystira.Ai"
            echo "### ⚠️ Vulnerable Packages Found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$RESULT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "### ✅ No Vulnerabilities Found" >> $GITHUB_STEP_SUMMARY
            echo "No known vulnerabilities detected in dependencies." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
