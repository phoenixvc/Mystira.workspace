name: "[CI] Workspace"

# Workspace-level CI: Runs linting, testing, and building across all packages
# This is the main CI pipeline that validates code quality and functionality
# Runs on: Pull requests and pushes to dev/main branches

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Provide empty token to prevent pnpm warnings about missing NODE_AUTH_TOKEN
  NODE_AUTH_TOKEN: ""

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN || 'dummy' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Python lint dependencies
        run: |
          pip install -r packages/chain/requirements.txt
          pip install -r packages/chain/requirements-dev.txt

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install ruff
        run: pip install ruff==0.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN || 'dummy' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Python test dependencies
        run: |
          pip install -r packages/chain/requirements.txt
          pip install -r packages/chain/requirements-dev.txt

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN || 'dummy' }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  build-dotnet:
    name: Build and Test .NET
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build .NET packages
        run: |
          PACKAGES=(
            "packages/contracts/dotnet/Mystira.Contracts"
            "packages/shared/Mystira.Shared"
            "packages/shared-messaging/Mystira.Shared.Messaging"
            "packages/shared-observability/Mystira.Shared.Observability"
            "packages/shared-graph/Mystira.Shared.Graph"
          )
          for PKG in "${PACKAGES[@]}"; do
            if [ -d "$PKG" ]; then
              echo "::group::Building $PKG"
              dotnet build "$PKG" --configuration Release
              echo "::endgroup::"
            fi
          done

      - name: Test Mystira.Shared
        run: dotnet test packages/shared/Mystira.Shared.Tests --configuration Release --no-build 2>/dev/null || echo "No tests or tests skipped"

      - name: Build Summary
        run: |
          echo "## .NET Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All shared .NET packages built successfully." >> $GITHUB_STEP_SUMMARY

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build, build-dotnet]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "# CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint (TypeScript) | ${{ needs.lint.result == 'success' && '???' || needs.lint.result == 'skipped' && '??????' || '???' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test (TypeScript) | ${{ needs.test.result == 'success' && '???' || needs.test.result == 'skipped' && '??????' || '???' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (TypeScript) | ${{ needs.build.result == 'success' && '???' || needs.build.result == 'skipped' && '??????' || '???' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (.NET) | ${{ needs.build-dotnet.result == 'success' && '???' || needs.build-dotnet.result == 'skipped' && '??????' || '???' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status
          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.test.result }}" == "success" ] && \
             [ "${{ needs.build.result }}" == "success" ] && \
             [ "${{ needs.build-dotnet.result }}" == "success" ]; then
            echo "## ??? All checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ??? Some checks failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please check the job logs above for details." >> $GITHUB_STEP_SUMMARY
          fi
