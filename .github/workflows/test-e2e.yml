name: "[Test] E2E"

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  e2e-tests:
    name: E2E Tests (Cypress + Accessibility)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Run E2E tests with Cypress
        uses: cypress-io/github-action@v6
        with:
          start: pnpm preview --port 3000
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
          browser: chrome
          headed: false
        env:
          CYPRESS_BASE_URL: http://localhost:3000

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: cypress/videos/
          retention-days: 7

      - name: Generate E2E summary
        if: always()
        run: |
          echo "## E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Browser:** Chrome (headless)" >> $GITHUB_STEP_SUMMARY
          echo "- **Base URL:** http://localhost:3000" >> $GITHUB_STEP_SUMMARY
          echo "- **Accessibility:** cypress-axe enabled" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tests Include" >> $GITHUB_STEP_SUMMARY
          echo "- Story Registration Flow" >> $GITHUB_STEP_SUMMARY
          echo "- Accessibility (a11y) validation via axe-core" >> $GITHUB_STEP_SUMMARY
