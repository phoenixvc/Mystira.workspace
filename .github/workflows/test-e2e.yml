name: "[Test] E2E"

on:
  push:
    branches: [main]
    paths:
      - "Mystira.DevHub/**"
      - ".github/workflows/test-e2e.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: Mystira.DevHub

jobs:
  e2e-linux:
    name: E2E Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Mystira.DevHub/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf xvfb

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Mystira.DevHub/src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install tauri-driver
        run: cargo install tauri-driver

      - name: Run E2E tests with WebDriver
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
            cargo test --manifest-path src-tauri/Cargo.toml --features e2e-test || true
        continue-on-error: true
        env:
          TAURI_SKIP_DEVSERVER_CHECK: true

  e2e-macos:
    name: E2E Tests (macOS)
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Mystira.DevHub/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Mystira.DevHub/src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install tauri-driver
        run: cargo install tauri-driver

      - name: Run E2E tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --features e2e-test || true
        continue-on-error: true
        env:
          TAURI_SKIP_DEVSERVER_CHECK: true

  e2e-windows:
    name: E2E Tests (Windows)
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Mystira.DevHub/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Mystira.DevHub/src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install tauri-driver
        run: cargo install tauri-driver

      - name: Run E2E tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --features e2e-test || exit 0
        continue-on-error: true
        env:
          TAURI_SKIP_DEVSERVER_CHECK: true
