name: "[Test] Load"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to test"
        required: true
        type: choice
        options:
          - dev
          - staging
      duration:
        description: "Test duration (e.g., 1m, 5m, 10m)"
        required: false
        type: string
        default: "2m"
      vus:
        description: "Number of virtual users"
        required: false
        type: number
        default: 10
      scenario:
        description: "Test scenario"
        required: true
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike
  schedule:
    # Run smoke tests daily at 6 AM UTC on dev
    - cron: "0 6 * * *"

concurrency:
  group: load-test-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  K6_VERSION: "0.49.0"

jobs:
  setup:
    name: Setup Load Test
    runs-on: ubuntu-latest
    outputs:
      base_url: ${{ steps.config.outputs.base_url }}
      duration: ${{ steps.config.outputs.duration }}
      vus: ${{ steps.config.outputs.vus }}
      scenario: ${{ steps.config.outputs.scenario }}
    steps:
      - name: Set test configuration
        id: config
        run: |
          # Set environment URL
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          case "$ENV" in
            dev)
              echo "base_url=https://dev.story-generator.mystira.app" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "base_url=https://staging.story-generator.mystira.app" >> $GITHUB_OUTPUT
              ;;
          esac

          # Set test parameters (use inputs or defaults for scheduled runs)
          echo "duration=${{ github.event.inputs.duration || '1m' }}" >> $GITHUB_OUTPUT
          echo "vus=${{ github.event.inputs.vus || '5' }}" >> $GITHUB_OUTPUT
          echo "scenario=${{ github.event.inputs.scenario || 'smoke' }}" >> $GITHUB_OUTPUT

  load-test:
    name: Run k6 Load Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v${{ env.K6_VERSION }}/k6-v${{ env.K6_VERSION }}-linux-amd64.tar.gz | tar xz
          sudo mv k6-v${{ env.K6_VERSION }}-linux-amd64/k6 /usr/local/bin/

      - name: Create k6 test script
        run: |
          mkdir -p .github/k6
          cat > .github/k6/story-generator-load.js << 'EOF'
          import http from 'k6/http';
          import { check, sleep, group } from 'k6';
          import { Rate, Trend, Counter } from 'k6/metrics';

          // Custom metrics
          const errorRate = new Rate('errors');
          const storyGenerationTime = new Trend('story_generation_time');
          const healthCheckTime = new Trend('health_check_time');
          const requestCounter = new Counter('requests');

          // Test configuration from environment
          const BASE_URL = __ENV.BASE_URL || 'https://dev.story-generator.mystira.app';
          const SCENARIO = __ENV.SCENARIO || 'smoke';

          // Scenario configurations
          const scenarios = {
            smoke: {
              vus: 1,
              duration: '30s',
              thresholds: {
                http_req_duration: ['p(95)<2000'],
                errors: ['rate<0.1'],
              },
            },
            load: {
              stages: [
                { duration: '1m', target: 10 },
                { duration: '3m', target: 10 },
                { duration: '1m', target: 0 },
              ],
              thresholds: {
                http_req_duration: ['p(95)<3000'],
                errors: ['rate<0.05'],
              },
            },
            stress: {
              stages: [
                { duration: '2m', target: 20 },
                { duration: '5m', target: 20 },
                { duration: '2m', target: 50 },
                { duration: '5m', target: 50 },
                { duration: '2m', target: 0 },
              ],
              thresholds: {
                http_req_duration: ['p(95)<5000'],
                errors: ['rate<0.1'],
              },
            },
            spike: {
              stages: [
                { duration: '10s', target: 100 },
                { duration: '1m', target: 100 },
                { duration: '10s', target: 0 },
              ],
              thresholds: {
                http_req_duration: ['p(95)<8000'],
                errors: ['rate<0.2'],
              },
            },
          };

          export const options = scenarios[SCENARIO] || scenarios.smoke;

          // Default function runs for each VU
          export default function () {
            group('Health Check', function () {
              const startTime = Date.now();
              const healthRes = http.get(`${BASE_URL}/health`);
              healthCheckTime.add(Date.now() - startTime);
              requestCounter.add(1);

              const healthOk = check(healthRes, {
                'health status is 200': (r) => r.status === 200,
                'health response time < 500ms': (r) => r.timings.duration < 500,
              });
              errorRate.add(!healthOk);
            });

            sleep(1);

            group('Story Generation API', function () {
              // Test story generation endpoint with sample payload
              const payload = JSON.stringify({
                genre: 'fantasy',
                theme: 'adventure',
                characters: ['hero', 'mentor'],
                setting: 'medieval kingdom',
                plotPoints: 3,
              });

              const params = {
                headers: {
                  'Content-Type': 'application/json',
                },
                timeout: '60s',
              };

              const startTime = Date.now();
              const storyRes = http.post(`${BASE_URL}/api/stories/generate`, payload, params);
              storyGenerationTime.add(Date.now() - startTime);
              requestCounter.add(1);

              const storyOk = check(storyRes, {
                'story generation status is 200 or 201': (r) => r.status === 200 || r.status === 201,
                'story generation response time < 30s': (r) => r.timings.duration < 30000,
                'story response has content': (r) => r.body && r.body.length > 0,
              });
              errorRate.add(!storyOk);
            });

            sleep(2);

            group('API Metadata', function () {
              // Test swagger endpoint
              const swaggerRes = http.get(`${BASE_URL}/swagger/v1/swagger.json`);
              requestCounter.add(1);

              const swaggerOk = check(swaggerRes, {
                'swagger status is 200': (r) => r.status === 200,
                'swagger is valid JSON': (r) => {
                  try {
                    JSON.parse(r.body);
                    return true;
                  } catch {
                    return false;
                  }
                },
              });
              errorRate.add(!swaggerOk);
            });

            sleep(1);
          }

          export function handleSummary(data) {
            return {
              'stdout': textSummary(data, { indent: ' ', enableColors: true }),
              'summary.json': JSON.stringify(data),
            };
          }

          function textSummary(data, opts) {
            // Simple text summary implementation
            let summary = '\n=== Load Test Summary ===\n\n';
            summary += `Total Requests: ${data.metrics.http_reqs?.values?.count || 0}\n`;
            summary += `Failed Requests: ${data.metrics.http_req_failed?.values?.passes || 0}\n`;
            summary += `Avg Response Time: ${Math.round(data.metrics.http_req_duration?.values?.avg || 0)}ms\n`;
            summary += `P95 Response Time: ${Math.round(data.metrics.http_req_duration?.values?.['p(95)'] || 0)}ms\n`;
            summary += `Error Rate: ${((data.metrics.errors?.values?.rate || 0) * 100).toFixed(2)}%\n`;
            return summary;
          }
          EOF

      - name: Run k6 load test
        id: k6
        run: |
          k6 run \
            --env BASE_URL=${{ needs.setup.outputs.base_url }} \
            --env SCENARIO=${{ needs.setup.outputs.scenario }} \
            --out json=results.json \
            .github/k6/story-generator-load.js 2>&1 | tee k6-output.txt

          # Extract key metrics for summary
          echo "k6_exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: |
            results.json
            summary.json
            k6-output.txt
          retention-days: 30

      - name: Generate test summary
        if: always()
        run: |
          echo "## Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment || 'dev' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scenario | ${{ needs.setup.outputs.scenario }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ needs.setup.outputs.duration }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Virtual Users | ${{ needs.setup.outputs.vus }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Base URL | ${{ needs.setup.outputs.base_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Test Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 k6-output.txt >> $GITHUB_STEP_SUMMARY || echo "No output captured" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check thresholds
        if: steps.k6.outputs.k6_exit_code != '0'
        run: |
          echo "::warning::Load test thresholds were not met. Review the results."

  analysis:
    name: Performance Analysis
    runs-on: ubuntu-latest
    needs: [setup, load-test]
    if: always()
    steps:
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: k6-results
        continue-on-error: true

      - name: Analyze results
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Performance Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "summary.json" ]; then
            echo "### Key Metrics" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat summary.json | head -100 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "_No detailed metrics available._" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recommendations" >> $GITHUB_STEP_SUMMARY
          echo "- Review P95 response times against SLO targets" >> $GITHUB_STEP_SUMMARY
          echo "- Monitor error rates during peak load" >> $GITHUB_STEP_SUMMARY
          echo "- Consider scaling if response times exceed thresholds" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_Load test completed at $(date -u +'%Y-%m-%d %H:%M:%S UTC')_" >> $GITHUB_STEP_SUMMARY
