name: "[Reusable] Infrastructure - Notifications"

# Reusable workflow for sending notifications to Slack and Teams
# Called by other infrastructure workflows

on:
  workflow_call:
    inputs:
      status:
        description: "Deployment status (success, failure, cancelled)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: string
      product:
        description: "Product being deployed"
        required: true
        type: string
      action:
        description: "Action performed (plan, apply, drift-check, etc.)"
        required: true
        type: string
      message:
        description: "Additional message"
        required: false
        type: string
        default: ""
      run_url:
        description: "URL to the workflow run"
        required: false
        type: string
        default: ""
    secrets:
      SLACK_WEBHOOK_URL:
        required: false
      TEAMS_WEBHOOK_URL:
        required: false

jobs:
  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ inputs.status == 'success' && '✅' || inputs.status == 'failure' && '❌' || '⚠️' }} Infrastructure ${{ inputs.action }}: ${{ inputs.status }}",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Product:*\n${{ inputs.product }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Environment:*\n${{ inputs.environment }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Action:*\n${{ inputs.action }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ inputs.status }}"
                    }
                  ]
                },
                ${{ inputs.message != '' && format('{{ "type": "section", "text": {{ "type": "mrkdwn", "text": "*Details:*\\n{0}" }} }},', inputs.message) || '' }}
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow Run",
                        "emoji": true
                      },
                      "url": "${{ inputs.run_url != '' && inputs.run_url || github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  notify-teams:
    name: Notify Teams
    runs-on: ubuntu-latest
    if: ${{ secrets.TEAMS_WEBHOOK_URL != '' }}
    steps:
      - name: Send Teams notification
        run: |
          STATUS_COLOR="${{ inputs.status == 'success' && '00FF00' || inputs.status == 'failure' && 'FF0000' || 'FFFF00' }}"
          STATUS_EMOJI="${{ inputs.status == 'success' && '✅' || inputs.status == 'failure' && '❌' || '⚠️' }}"

          cat > payload.json << 'EOF'
          {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "$STATUS_COLOR",
            "summary": "Infrastructure ${{ inputs.action }}: ${{ inputs.status }}",
            "sections": [{
              "activityTitle": "$STATUS_EMOJI Infrastructure ${{ inputs.action }}: ${{ inputs.status }}",
              "facts": [{
                "name": "Product",
                "value": "${{ inputs.product }}"
              }, {
                "name": "Environment",
                "value": "${{ inputs.environment }}"
              }, {
                "name": "Action",
                "value": "${{ inputs.action }}"
              }, {
                "name": "Status",
                "value": "${{ inputs.status }}"
              }${{ inputs.message != '' && format(', {{ "name": "Details", "value": "{0}" }}', inputs.message) || '' }}],
              "markdown": true
            }],
            "potentialAction": [{
              "@type": "OpenUri",
              "name": "View Workflow Run",
              "targets": [{
                "os": "default",
                "uri": "${{ inputs.run_url != '' && inputs.run_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}"
              }]
            }]
          }
          EOF

          # Replace variables in payload
          sed -i "s/\$STATUS_COLOR/$STATUS_COLOR/g" payload.json
          sed -i "s/\$STATUS_EMOJI/$STATUS_EMOJI/g" payload.json

          curl -H "Content-Type: application/json" -d @payload.json "${{ secrets.TEAMS_WEBHOOK_URL }}"
