name: "[Test] Contract"

# API Contract validation workflow
# Validates that API implementations match their OpenAPI specifications
# Ensures consumers and providers stay in sync
#
# Layer 3 of the validation stack: Higher-level validation

on:
  push:
    branches: [dev, main]
    paths:
      - 'packages/api-spec/openapi/**'
      - 'packages/contracts/**'
      - 'packages/*/src/**/*.ts'
      - 'packages/*/**/*.cs'
      - '.github/workflows/test-contract.yml'

  pull_request:
    branches: [dev, main]
    paths:
      - 'packages/api-spec/openapi/**'
      - 'packages/contracts/**'

  workflow_dispatch:
    inputs:
      validate_breaking:
        description: 'Check for breaking changes'
        required: false
        type: boolean
        default: true

concurrency:
  group: contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-openapi:
    name: Validate OpenAPI Specs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Configure npm for CI (skip private registry auth for alpha)
        run: |
          sed -i '/npm.pkg.github.com.*authToken/d' .npmrc || true

      - name: Install dependencies
        run: pnpm install

      - name: Validate OpenAPI specifications
        run: |
          cd packages/api-spec
          pnpm run validate

      - name: Check for spec completeness
        run: |
          echo "## OpenAPI Specification Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List all specs
          echo "### Specifications Found" >> $GITHUB_STEP_SUMMARY
          for spec in packages/api-spec/openapi/*.yaml; do
            if [ -f "$spec" ]; then
              echo "- $(basename $spec)" >> $GITHUB_STEP_SUMMARY
            fi
          done

  check-breaking-changes:
    name: Check Breaking Changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Don't block PRs for breaking changes during alpha - just warn
    continue-on-error: true
    if: github.event_name == 'pull_request' || github.event.inputs.validate_breaking == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Configure npm for CI (skip private registry auth for alpha)
        run: |
          sed -i '/npm.pkg.github.com.*authToken/d' .npmrc || true

      - name: Install dependencies
        run: pnpm install

      - name: Install oasdiff
        run: |
          curl -sSL https://github.com/Tufin/oasdiff/releases/download/v1.10.10/oasdiff_1.10.10_linux_amd64.tar.gz | tar xz
          sudo mv oasdiff /usr/local/bin/

      - name: Check for breaking changes
        id: breaking
        run: |
          BREAKING_FOUND=false
          VERSION_BUMPED=false

          # Use base_ref for PRs, fallback to dev for workflow_dispatch
          BASE_REF="${{ github.base_ref }}"
          if [ -z "$BASE_REF" ]; then
            BASE_REF="dev"
          fi

          for spec in packages/api-spec/openapi/*.yaml; do
            if [ -f "$spec" ]; then
              SPEC_NAME=$(basename "$spec")

              # Get the base branch version
              git show "origin/${BASE_REF}:${spec}" > /tmp/base-spec.yaml 2>/dev/null || continue

              echo "Checking $SPEC_NAME for breaking changes..."

              # Run oasdiff
              RESULT=$(oasdiff breaking /tmp/base-spec.yaml "$spec" 2>&1) || true

              if echo "$RESULT" | grep -q "error\|breaking"; then
                echo "::warning::Breaking changes detected in $SPEC_NAME"
                echo "### Breaking Changes in $SPEC_NAME" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "$RESULT" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                BREAKING_FOUND=true

                # Check if the API version was bumped
                BASE_VERSION=$(grep -E '^\s*version:' /tmp/base-spec.yaml | head -1 | sed 's/.*version:\s*//' | tr -d '"' | tr -d "'" || echo "0.0.0")
                HEAD_VERSION=$(grep -E '^\s*version:' "$spec" | head -1 | sed 's/.*version:\s*//' | tr -d '"' | tr -d "'" || echo "0.0.0")

                echo "Base version: $BASE_VERSION, Head version: $HEAD_VERSION"

                # Extract major versions for comparison
                BASE_MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
                HEAD_MAJOR=$(echo "$HEAD_VERSION" | cut -d. -f1)

                # Check if version was bumped (any version increase counts)
                if [ "$HEAD_VERSION" != "$BASE_VERSION" ]; then
                  # Simple semver comparison: check if head > base
                  if [ "$HEAD_MAJOR" -gt "$BASE_MAJOR" ] 2>/dev/null; then
                    echo "::notice::Major version bumped from $BASE_VERSION to $HEAD_VERSION - breaking change acknowledged"
                    echo "✅ **Version bumped**: $BASE_VERSION → $HEAD_VERSION (breaking change acknowledged)" >> $GITHUB_STEP_SUMMARY
                    VERSION_BUMPED=true
                  elif [ "$HEAD_VERSION" != "$BASE_VERSION" ]; then
                    # Any version change (minor/patch) also counts during alpha
                    echo "::notice::Version bumped from $BASE_VERSION to $HEAD_VERSION - breaking change acknowledged"
                    echo "✅ **Version bumped**: $BASE_VERSION → $HEAD_VERSION (breaking change acknowledged)" >> $GITHUB_STEP_SUMMARY
                    VERSION_BUMPED=true
                  fi
                fi
              else
                echo "No breaking changes in $SPEC_NAME"
              fi
            fi
          done

          echo "breaking_found=$BREAKING_FOUND" >> $GITHUB_OUTPUT
          echo "version_bumped=$VERSION_BUMPED" >> $GITHUB_OUTPUT

      - name: Fail on breaking changes without version bump
        if: steps.breaking.outputs.breaking_found == 'true' && steps.breaking.outputs.version_bumped != 'true'
        run: |
          echo "::error::Breaking API changes detected without version bump. Please update the API version in the OpenAPI spec."
          exit 1

      - name: Acknowledge breaking changes with version bump
        if: steps.breaking.outputs.breaking_found == 'true' && steps.breaking.outputs.version_bumped == 'true'
        run: |
          echo "::notice::Breaking API changes detected but version was appropriately bumped. Proceeding."
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ Breaking changes were detected but the API version was updated, indicating intentional changes." >> $GITHUB_STEP_SUMMARY

  contract-typescript:
    name: TypeScript Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate-openapi]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Configure npm for CI (skip private registry auth for alpha)
        run: |
          # Remove private registry auth requirement for CI builds during alpha
          sed -i '/npm.pkg.github.com.*authToken/d' .npmrc || true

      - name: Install dependencies
        run: pnpm install

      - name: Build contracts package
        run: |
          cd packages/contracts
          pnpm build

      - name: Run contract type tests
        run: |
          cd packages/contracts
          pnpm test 2>&1

      - name: Verify generated types compile
        run: |
          cd packages/contracts
          pnpm exec tsc --noEmit

  contract-dotnet:
    name: .NET Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate-openapi]
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
          source-url: https://nuget.pkg.github.com/phoenixvc/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build Mystira.Contracts
        run: |
          dotnet build packages/contracts/dotnet/Mystira.Contracts --configuration Release

      - name: Verify contract serialization
        run: |
          # Run any contract serialization tests
          if [ -d "packages/contracts/dotnet/Mystira.Contracts.Tests" ]; then
            dotnet test packages/contracts/dotnet/Mystira.Contracts.Tests --configuration Release
          fi

  consumer-contract-tests:
    name: Consumer Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate-openapi]
    strategy:
      matrix:
        consumer:
          - name: admin-ui
            path: packages/admin-ui
          - name: app-pwa
            path: packages/app
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Configure npm for CI (skip private registry auth for alpha)
        run: |
          sed -i '/npm.pkg.github.com.*authToken/d' .npmrc || true

      - name: Install dependencies
        run: pnpm install

      - name: Run consumer contract tests
        working-directory: ${{ matrix.consumer.path }}
        run: |
          if [ -f "package.json" ] && grep -q "test:contract" package.json; then
            pnpm test:contract
          else
            echo "No contract tests defined for ${{ matrix.consumer.name }}"
          fi
        continue-on-error: true

  summary:
    name: Contract Test Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate-openapi, contract-typescript, contract-dotnet, consumer-contract-tests]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "# Contract Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| OpenAPI Validation | ${{ needs.validate-openapi.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Contracts | ${{ needs.contract-typescript.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| .NET Contracts | ${{ needs.contract-dotnet.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Consumer Tests | ${{ needs.consumer-contract-tests.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
