name: Build Tauri Apps

on:
  push:
    branches: [dev, main]
    paths:
      - "Mystira.DevHub/**"
      - "Mystira.Leptos/**"
      - "crates/**"
      - "Cargo.toml"
      - ".github/workflows/build-tauri.yml"
  workflow_dispatch:
    inputs:
      frontend:
        description: 'Frontend to build'
        required: true
        type: choice
        options:
          - both
          - react
          - leptos
        default: both

concurrency:
  group: build-tauri-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================================
  # React + Tauri 1.x (Existing DevHub)
  # ============================================================================

  build-react-tauri:
    name: Build React Tauri (${{ matrix.platform.name }})
    if: github.event.inputs.frontend != 'leptos'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: devhub-react-linux-x64
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: devhub-react-windows-x64
          - name: macOS
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: devhub-react-macos-x64
    runs-on: ${{ matrix.platform.os }}
    defaults:
      run:
        working-directory: Mystira.DevHub
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: Mystira.DevHub/pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Mystira.DevHub/src-tauri
          shared-key: react-tauri-${{ matrix.platform.target }}

      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        run: pnpm tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: |
            Mystira.DevHub/src-tauri/target/release/bundle/**/*
          retention-days: 14
          if-no-files-found: warn

  # ============================================================================
  # Leptos + Tauri 2.0 (New Frontend)
  # ============================================================================

  build-leptos-tauri:
    name: Build Leptos Tauri (${{ matrix.platform.name }})
    if: github.event.inputs.frontend != 'react'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: devhub-leptos-linux-x64
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: devhub-leptos-windows-x64
          - name: macOS Intel
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: devhub-leptos-macos-x64
          - name: macOS ARM
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: devhub-leptos-macos-arm64
    runs-on: ${{ matrix.platform.os }}
    defaults:
      run:
        working-directory: Mystira.Leptos
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,${{ matrix.platform.target }}

      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Install tauri-cli
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Install system dependencies (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js (for Tailwind)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: leptos-tauri-${{ matrix.platform.target }}

      - name: Install npm dependencies
        run: npm install

      - name: Build CSS
        run: npm run css

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.platform.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: |
            Mystira.Leptos/src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*
          retention-days: 14
          if-no-files-found: warn

  # ============================================================================
  # Summary
  # ============================================================================

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-react-tauri, build-leptos-tauri]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| React + Tauri 1.x | ${{ needs.build-react-tauri.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Leptos + Tauri 2.0 | ${{ needs.build-leptos-tauri.result }} |" >> $GITHUB_STEP_SUMMARY
