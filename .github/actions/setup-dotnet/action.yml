name: "Setup .NET"
description: "Composite action to setup .NET SDK"

inputs:
  dotnet-version:
    description: ".NET SDK version"
    required: false
    default: "10.0.x"

runs:
  using: "composite"
  steps:
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}
      env:
        DOTNET_NOLOGO: true
        DOTNET_CLI_TELEMETRY_OPTOUT: true
