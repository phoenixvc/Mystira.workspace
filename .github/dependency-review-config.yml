# Dependency Review Configuration
# https://github.com/actions/dependency-review-action

# Minimum severity to fail on (critical, high, medium, low)
fail-on-severity: high

# Only fail on runtime dependencies; dev/test dependency vulnerabilities
# are reported as warnings to avoid blocking PRs for tooling deps.
fail-on-scopes:
  - runtime

# Write a summary comment to the PR on failure
comment-summary-in-pr: on-failure
